// ─── CONTAS BANCÁRIAS ─────────────────────────────────────────────────────────
function ContasBancarias({contasBancarias,setContasBancarias,contasBancariasRaw,toast}) {
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [busca,setBusca]=useState("");
  const empty={banco:"",agencia:"",conta:"",tipoConta:"Corrente",titular:"",cpfCnpj:"",pix:"",obs:""};
  const [form,setForm]=useState(empty);
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const BANCOS=["Sicoob","Itaú","Bradesco","Santander","Caixa Econômica","Banco do Brasil","Nubank","Inter","C6 Bank","Outro"];
  const TIPOS=["Corrente","Poupança","Pagamento"];

  const openNew=()=>{setForm(empty);setEditing(null);setModal(true);};
  const openEdit=x=>{setForm({...x});setEditing(x.id);setModal(true);};
  const save=()=>{
    if(!form.banco.trim()){toast("⚠️ Informe o banco");return;}
    if(!form.conta.trim()){toast("⚠️ Informe o número da conta");return;}
    if(editing) setContasBancarias(p=>p.map(x=>x.id===editing?{...form,id:editing}:x));
    else setContasBancarias(p=>[...p,{...form,id:Date.now()}]);
    setModal(false);toast(editing?"✅ Conta atualizada!":"✅ Conta bancária cadastrada!");
  };
  const excluir=id=>{setContasBancarias(p=>p.filter(x=>x.id!==id));toast("🗑️ Conta removida!");};

  const lista=(contasBancarias||[]).filter(x=>!busca||
    x.banco?.toLowerCase().includes(busca.toLowerCase())||
    x.titular?.toLowerCase().includes(busca.toLowerCase())||
    x.conta?.includes(busca));
  const totalUser=(contasBancariasRaw||[]).length;

  return (
    <div>
      {modal&&(
        <Modal title={editing?"Editar Conta Bancária":"Nova Conta Bancária"} onClose={()=>setModal(false)}>
          <div className="form-grid">
            <Sel label="Banco" value={form.banco} onChange={f("banco")}>
              <option value="">Selecione...</option>
              {BANCOS.map(b=><option key={b}>{b}</option>)}
            </Sel>
            <Sel label="Tipo de Conta" value={form.tipoConta} onChange={f("tipoConta")}>
              {TIPOS.map(t=><option key={t}>{t}</option>)}
            </Sel>
            <Inp label="Agência" value={form.agencia} placeholder="0000" onChange={f("agencia")}/>
            <Inp label="Conta" value={form.conta} placeholder="00000-0" onChange={f("conta")}/>
            <Inp label="Titular" value={form.titular} placeholder="Nome completo ou razão social" onChange={f("titular")}/>
            <Inp label="CPF / CNPJ do Titular" value={form.cpfCnpj} onChange={f("cpfCnpj")}/>
            <Inp label="Chave PIX" value={form.pix} placeholder="CPF, e-mail, telefone ou chave aleatória" onChange={f("pix")}/>
            <div className="form-full"><Txt label="Observações" value={form.obs} placeholder="Uso interno, finalidade, etc." onChange={f("obs")}/></div>
          </div>
          <div className="modal-actions">
            <button className="btn sec" onClick={()=>setModal(false)}>Cancelar</button>
            <button className="btn" onClick={save}>{editing?"Salvar Alterações":"Cadastrar Conta"}</button>
          </div>
        </Modal>
      )}
      <div className="filter-bar">
        <Inp label="" placeholder="🔍 Buscar banco, titular ou conta..." value={busca} onChange={e=>setBusca(e.target.value)}/>
        {busca&&<button className="btn sm sec" onClick={()=>setBusca("")}>✕</button>}
      </div>
      <div className="card">
        <div className="card-header">
          <div><div className="card-title">Contas Bancárias</div><div className="card-sub">{2} contas do sistema + {totalUser} cadastrada(s)</div></div>
          <button className="btn" onClick={openNew}>+ Nova Conta</button>
        </div>
        <div className="table-wrap" style={{maxHeight:520,overflowY:"auto"}}>
          <table style={{minWidth:700}}>
            <thead style={{position:"sticky",top:0,zIndex:2,background:"var(--surface)"}}>
              <tr>
                <th style={{background:"var(--surface)"}}>Banco</th>
                <th style={{background:"var(--surface)"}}>Titular</th>
                <th style={{background:"var(--surface)"}}>Agência</th>
                <th style={{background:"var(--surface)"}}>Conta</th>
                <th style={{background:"var(--surface)"}}>Tipo</th>
                <th style={{background:"var(--surface)"}}>Chave PIX</th>
                <th style={{background:"var(--surface)"}}>Ações</th>
              </tr>
            </thead>
            <tbody>{lista.map(x=>(
              <tr key={x.id} style={x._sistema?{opacity:0.75,background:"var(--bg3)"}:{}}>
                <td style={{fontWeight:600}}>
                  {x._sistema&&<span style={{fontSize:10,background:"var(--accent-glow)",color:"var(--accent2)",padding:"1px 6px",borderRadius:8,marginRight:6,fontWeight:700}}>SISTEMA</span>}
                  {x.banco}
                </td>
                <td>{x.titular}</td>
                <td style={{fontSize:12,color:"var(--text3)"}}>{x.agencia||"—"}</td>
                <td><code style={{fontSize:12,background:"var(--bg3)",padding:"2px 6px",borderRadius:4,color:"var(--accent2)"}}>{x.conta}</code></td>
                <td><span style={{fontSize:11,background:"var(--bg3)",padding:"2px 8px",borderRadius:10,color:"var(--text2)"}}>{x.tipoConta}</span></td>
                <td style={{fontSize:12,color:"var(--text3)"}}>{x.pix||"—"}</td>
                <td>
                  {x._sistema
                    ?<span style={{fontSize:11,color:"var(--text3)",fontStyle:"italic"}}>fixo</span>
                    :<div className="action-group">
                      <button className="btn sm sec" title="Editar" onClick={()=>openEdit(x)}>✏️</button>
                      <button className="btn sm danger" title="Excluir" onClick={()=>excluir(x.id)}>🗑️</button>
                    </div>}
                </td>
              </tr>
            ))}</tbody>
          </table>
          {lista.length===0&&<div className="empty-state">Nenhuma conta bancária cadastrada</div>}
        </div>
      </div>
    </div>
  );
}


// ─── COBRANÇAS LOCAIS (sem integração Asaas) ─────────────────────────────────
function CobrancasLocais({clientes,subcontas,receber,setReceber,pagar,setPagar,plano,contasBancarias,toast}) {
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [fCliente,setFCliente]=useState("");
  const [fAluno,setFAluno]=useState("");
  const [fStatus,setFStatus]=useState([]);
  const [periodoIni,setPeriodoIni]=useState("");
  const [periodoFim,setPeriodoFim]=useState("");
  const [sortCol,setSortCol]=useState("vencimento");
  const [sortDir,setSortDir]=useState("asc");
  const toggleSort=(col)=>{if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortCol(col);setSortDir("asc");}};
  const toggleStatus=(v)=>setFStatus(prev=>prev.includes(v)?prev.filter(x=>x!==v):[...prev,v]);

  const FORMAS=["Dinheiro","Pix Terapeuta","Pix Sicoob","Boleto","Transferência","Cheque","Outro"];
  const cats3Rec=plano.filter(p=>p.nivel===3&&(p.tipo==="receber"||p.tipo==="ambos")&&p.ativo!==false);
  const cats3Pag=plano.filter(p=>p.nivel===3&&(p.tipo==="pagar"||p.tipo==="ambos")&&p.ativo!==false);

  const [cobLocais,setCobLocaisRaw]=useState(()=>{try{const d=localStorage.getItem("coblocal");return d?JSON.parse(d):[];}catch{return[];}});
  const setCobLocais=(fn)=>setCobLocaisRaw(prev=>{const next=typeof fn==="function"?fn(prev):fn;try{localStorage.setItem("coblocal",JSON.stringify(next));}catch{}return next;});

  const emptyForm={clienteId:"",descricao:"",valor:"",vencimento:"",formaPagamento:"Dinheiro",planoIdRec:"",contaBancariaId:"",splits:[],obs:""};
  const [form,setForm]=useState(emptyForm);
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const openNew=()=>{setForm(emptyForm);setEditing(null);setModal(true);};
  const openEdit=x=>{setForm({...x,splits:x.splits||[]});setEditing(x.id);setModal(true);};
  const openClone=x=>{setForm({...x,id:undefined,vencimento:"",splits:x.splits||[]});setEditing(null);setModal(true);};

  // Splits locais
  const addSplit=()=>{if(form.splits.length>=3){toast("⚠️ Máximo 3 splits");return;}setForm(p=>({...p,splits:[...p.splits,{subcontaId:"",tipo:"PERCENTUAL",valor:""}]}));};
  const updSplit=(i,k,v)=>setForm(p=>{const s=[...p.splits];s[i]={...s[i],[k]:v};return{...p,splits:s};});
  const remSplit=i=>setForm(p=>({...p,splits:p.splits.filter((_,idx)=>idx!==i)}));

  const salvar=()=>{
    const cl=clientes.find(c=>c.id===+form.clienteId);
    if(!cl){toast("⚠️ Selecione um cliente");return;}
    if(!form.valor||+form.valor<=0){toast("⚠️ Informe o valor");return;}
    if(!form.vencimento){toast("⚠️ Informe o vencimento");return;}

    const id=editing||Date.now();
    const cob={...form,id,cliente:cl.nome,clienteId:cl.id,status:"pendente",criadoEm:new Date().toISOString().slice(0,10)};

    if(editing){
      setCobLocais(p=>p.map(x=>x.id===editing?cob:x));
      toast("✅ Cobrança local atualizada!");
    } else {
      setCobLocais(p=>[...p,cob]);
      // Gera Contas a Receber
      const alunoLocal=cl.nomeAluno?"Aluno: "+cl.nomeAluno:"";
      const contaRecLabel="";
      setReceber(p=>[...p,{
        id:Date.now()+1,
        descricao:form.descricao||`Cobrança — ${cl.nome}`,
        observacao:[`Cliente: ${cl.nome}`,alunoLocal].filter(Boolean).join(" · "),
        cliente:cl.nome,clienteId:cl.id,
        valor:+form.valor,vencimento:form.vencimento,
        status:"pendente",
        planoId:form.planoIdRec?+form.planoIdRec:null,
        formaPagamento:form.formaPagamento,
        contaBancariaId:form.contaBancariaId||null,
        cobLocalId:id,
        criadoEm:new Date().toISOString().slice(0,10),
      }]);
      // Gera Contas a Pagar para cada split
      const splitsValidos=(form.splits||[]).filter(s=>s.subcontaId&&+s.valor>0);
      const novosAPagar=splitsValidos.map((s,i)=>{
        const _subAsaas=subcontas.find(x=>x.id===+s.subcontaId);
        const _subConta=contasBancarias?.find(x=>x.id===+s.subcontaId);
        const sub=_subAsaas||(_subConta?{..._subConta,nome:_subConta.titular||_subConta.banco}:null);
        const valorRep=s.tipo==="FIXED"?+s.valor:(+form.valor)*(+s.valor/100);
        const alunoObsLocal=cl.nomeAluno?` · Aluno: ${cl.nomeAluno}`:"";
        const contaLabel="";
        return {
          id:Date.now()+2+i,
          descricao:`Split — ${form.descricao||`Cobrança ${cl.nome}`}`,
          observacao:`Repasse para ${sub?.nome||s.subcontaId} · Cliente: ${cl.nome}${alunoObsLocal}`,
          fornecedor:sub?.nome||s.subcontaId,
          fornecedorId:sub?.id||null,
          contaBancariaId:s.conta||null,
          valor:+valorRep.toFixed(2),
          vencimento:form.vencimento,
          status:"pendente",
          planoId:s.planoIdPag?+s.planoIdPag:null,
          formaPagamento:form.formaPagamento,
          cobLocalId:id,
          criadoEm:new Date().toISOString().slice(0,10),
        };
      });
      if(novosAPagar.length) setPagar(p=>[...p,...novosAPagar]);
      toast(`✅ Cobrança local criada${novosAPagar.length?` + ${novosAPagar.length} repasse(s) em Contas a Pagar`:""}!`);
    }
    setModal(false);setForm(emptyForm);
  };

  const excluir=cob=>{
    setCobLocais(p=>p.filter(x=>x.id!==cob.id));
    toast("🗑️ Cobrança excluída!");setConfirmDel(null);
  };
  const marcarRecebido=cob=>{
    setCobLocais(p=>p.map(x=>x.id===cob.id?{...x,status:"RECEIVED"}:x));
    setReceber(p=>p.map(r=>r.cobLocalId===cob.id?{...r,status:"recebido"}:r));
    toast("✅ Cobrança marcada como recebida!");
  };

  const STATUS_LIST=[["PENDING","Pendente","var(--yellow)"],["RECEIVED","Recebido","var(--green)"],["OVERDUE","Vencido","var(--red)"],["CANCELLED","Cancelado","var(--text3)"]];

  const lista=(cobLocais||[]).filter(c=>{
    const cli=clientes.find(x=>x.id===+c.clienteId||x.nome===c.cliente);
    if(fCliente&&!c.cliente?.toLowerCase().includes(fCliente.toLowerCase())&&!(cli?.nomeAluno||"").toLowerCase().includes(fCliente.toLowerCase())) return false;
    if(fAluno&&!(cli?.nomeAluno||"").toLowerCase().includes(fAluno.toLowerCase())) return false;
    if(fStatus.length&&!fStatus.includes(c.status)) return false;
    if(periodoIni&&(c.vencimento||"")<periodoIni) return false;
    if(periodoFim&&(c.vencimento||"")>periodoFim) return false;
    return true;
  }).sort((a,b)=>{
    if(sortCol==="cliente") return sortDir==="asc"?(a.cliente||"").localeCompare(b.cliente||"","pt-BR"):(b.cliente||"").localeCompare(a.cliente||"","pt-BR");
    if(sortCol==="valor") return sortDir==="asc"?(a.valor-b.valor):(b.valor-a.valor);
    return sortDir==="asc"?(a.vencimento||"").localeCompare(b.vencimento||""):(b.vencimento||"").localeCompare(a.vencimento||"");
  });

  const SortTh=({col,label})=>(
    <th onClick={()=>toggleSort(col)} style={{cursor:"pointer",userSelect:"none",whiteSpace:"nowrap",background:"var(--surface)"}}>
      <span style={{display:"flex",alignItems:"center",gap:4}}>{label}
        <span style={{fontSize:10,color:sortCol===col?"var(--accent2)":"var(--text3)"}}>{sortCol===col?(sortDir==="asc"?"▲":"▼"):"⇅"}</span>
      </span>
    </th>
  );

  return (
    <div>
      {confirmDel&&<ConfirmModal msg={`Excluir cobrança de ${fmt(confirmDel.valor)} — ${confirmDel.cliente}?`} onConfirm={()=>excluir(confirmDel)} onClose={()=>setConfirmDel(null)}/>}
      {modal&&(
        <Modal title={editing?"Editar Cobrança Local":"Nova Cobrança Local"} onClose={()=>setModal(false)} maxWidth={700}>
          <div className="form-grid">
            <Sel label="Cliente" value={form.clienteId} onChange={f("clienteId")}>
              <option value="">Selecione...</option>
              {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}{c.nomeAluno?` (${c.nomeAluno})`:""}</option>)}
            </Sel>
            <Sel label="Forma de Pagamento" value={form.formaPagamento} onChange={f("formaPagamento")}>
              {FORMAS.map(fp=><option key={fp}>{fp}</option>)}
            </Sel>
            <Inp label="Valor (R$)" type="number" value={form.valor} onChange={f("valor")}/>
            <Inp label="Vencimento" type="date" value={form.vencimento} onChange={f("vencimento")}/>
            <Sel label="Categoria — A Receber" value={form.planoIdRec} onChange={f("planoIdRec")}>
              <option value="">Selecione...</option>
              {cats3Rec.map(p=><option key={p.id} value={p.id}>{p.codigo} — {p.nome}</option>)}
            </Sel>
            <Sel label="Conta de Recebimento" value={form.contaBancariaId} onChange={f("contaBancariaId")}>
              <option value="">Selecione a conta...</option>
              {(contasBancarias||[]).map(cb=><option key={cb.id} value={cb.id}>{cb.banco}</option>)}
            </Sel>
            <div className="form-full"><Txt label="Descrição" placeholder="Descrição do serviço prestado" value={form.descricao} onChange={f("descricao")}/></div>
            <div className="form-full"><Txt label="Observações" placeholder="Informações adicionais" value={form.obs} onChange={f("obs")}/></div>
          </div>
          {/* Splits locais */}
          <div style={{marginTop:12}}>
            <div className="form-section-title">Divisão de Valores (Splits)</div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
              {form.splits.map((s,i)=>(
                <div key={i} style={{background:"var(--bg3)",borderRadius:8,padding:"12px 14px",display:"grid",gridTemplateColumns:"auto 1fr 1fr",gap:"8px 10px",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,gridColumn:"1/-1"}}>
                    <button style={{background:"none",border:"none",color:"var(--red)",cursor:"pointer",fontSize:14}} onClick={()=>remSplit(i)}>✕</button>
                    <span style={{fontSize:11,color:"var(--text3)",fontWeight:700,letterSpacing:"0.5px"}}>SPLIT {i+1}</span>
                    {s.valor&&form.valor&&<span style={{marginLeft:"auto",fontSize:12,color:"var(--green)",fontWeight:700,background:"rgba(62,207,142,.12)",padding:"2px 10px",borderRadius:10}}>
                      = {fmt(s.tipo==="FIXED"?+s.valor:(+form.valor)*(+s.valor/100))}
                    </span>}
                  </div>
                  <Sel label="Beneficiário" value={s.subcontaId} onChange={e=>updSplit(i,"subcontaId",e.target.value)}>
                    <option value="">Terapeuta / Conta...</option>
                    {subcontas.map(x=><option key={x.id} value={x.id}>{x.nome}</option>)}
                    {(contasBancarias||[]).map(x=><option key={"cb"+x.id} value={x.id}>{x.banco}</option>)}
                  </Sel>
                  <Sel label="Conta de destino" value={s.conta||""} onChange={e=>updSplit(i,"conta",e.target.value)}>
                    <option value="">Selecione a conta...</option>
                    {(contasBancarias||[]).map(x=><option key={"dest"+x.id} value={String(x.id)}>{x.banco}</option>)}
                  </Sel>
                  <Sel label="Tipo" value={s.tipo} onChange={e=>updSplit(i,"tipo",e.target.value)}>
                    <option value="PERCENTUAL">Percentual (%)</option>
                    <option value="FIXED">Valor Fixo (R$)</option>
                  </Sel>
                  <Inp label={s.tipo==="FIXED"?"Valor (R$)":"Percentual (%)"} type="number" value={s.valor} onChange={e=>updSplit(i,"valor",e.target.value)}/>
                  <Sel label="Categoria (Contas a Pagar)" value={s.planoIdPag||""} onChange={e=>updSplit(i,"planoIdPag",e.target.value)}>
                    <option value="">Selecione...</option>
                    {cats3Pag.map(p=><option key={p.id} value={p.id}>{p.codigo} — {p.nome}</option>)}
                  </Sel>
                </div>
              ))}
            </div>
            <button className="add-split-btn" onClick={addSplit} style={{marginTop:8}}>+ Adicionar Split ({form.splits.length}/3)</button>
          </div>
          <div className="modal-actions">
            <button className="btn sec" onClick={()=>setModal(false)}>Cancelar</button>
            <button className="btn" onClick={salvar}>{editing?"Salvar Alterações":"💾 Gerar Cobrança"}</button>
          </div>
        </Modal>
      )}

      <div className="card">
        <div className="card-header">
          <div><div className="card-title">Cobranças Locais</div><div className="card-sub">{cobLocais.length} registros</div></div>
          <button className="btn" onClick={openNew}>+ Nova Cobrança</button>
        </div>

        {/* Filtros */}
        <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:10,padding:"14px 16px",marginBottom:16}}>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center",marginBottom:10}}>
            <div style={{position:"relative",flex:"1 1 200px"}}>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--text3)",fontSize:13}}>🔍</span>
              <input className="form-input" style={{paddingLeft:30,height:36}} placeholder="Cliente ou aluno..." value={fCliente} onChange={e=>setFCliente(e.target.value)}/>
            </div>
            <div style={{position:"relative",flex:"1 1 160px"}}>
              <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--text3)",fontSize:13}}>🎒</span>
              <input className="form-input" style={{paddingLeft:30,height:36}} placeholder="Filtrar por aluno..." value={fAluno} onChange={e=>setFAluno(e.target.value)}/>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>Status:</span>
              {STATUS_LIST.map(([v,l,cor])=>{
                const ativo=fStatus.includes(v);
                return <button key={v} onClick={()=>toggleStatus(v)} style={{padding:"4px 11px",borderRadius:20,fontSize:12,cursor:"pointer",border:`1.5px solid ${ativo?cor:"var(--border)"}`,background:ativo?cor+"22":"transparent",color:ativo?cor:"var(--text3)",fontWeight:ativo?700:400,transition:"all .15s"}}>{l}</button>;
              })}
            </div>
            {(fCliente||fAluno||fStatus.length||periodoIni||periodoFim)&&<button className="btn sm sec" style={{marginLeft:"auto"}} onClick={()=>{setFCliente("");setFAluno("");setFStatus([]);setPeriodoIni("");setPeriodoFim("");}}>✕ Limpar</button>}
          </div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,color:"var(--text3)",fontWeight:600}}>Vencimento:</span>
            <input type="date" className="form-input" style={{height:32,width:150,fontSize:13}} value={periodoIni} onChange={e=>setPeriodoIni(e.target.value)}/>
            <span style={{fontSize:12,color:"var(--text3)"}}>até</span>
            <input type="date" className="form-input" style={{height:32,width:150,fontSize:13}} value={periodoFim} onChange={e=>setPeriodoFim(e.target.value)}/>
            <span style={{fontSize:12,color:"var(--text3)",marginLeft:8}}>{lista.length} resultado(s)</span>
          </div>
        </div>

        <div className="table-wrap" style={{maxHeight:520,overflowY:"auto"}}>
          <table style={{minWidth:900}}>
            <thead style={{position:"sticky",top:0,zIndex:2,background:"var(--surface)"}}>
              <tr>
                <SortTh col="cliente" label="Cliente"/>
                <th style={{background:"var(--surface)"}}>Aluno</th>
                <th style={{background:"var(--surface)"}}>Descrição</th>
                <th style={{background:"var(--surface)"}}>Forma Pag.</th>
                <SortTh col="valor" label="Valor"/>
                <SortTh col="vencimento" label="Vencimento"/>
                <th style={{background:"var(--surface)"}}>Splits</th>
                <th style={{background:"var(--surface)"}}>Status</th>
                <th style={{background:"var(--surface)"}}>Ações</th>
              </tr>
            </thead>
            <tbody>{lista.map(c=>{
              const cli=clientes.find(x=>x.id===+c.clienteId||x.nome===c.cliente);
              const aluno=cli?.nomeAluno||"—";
              const d=daysFromNow(c.vencimento);
              const venceu=c.status==="PENDING"&&d<0;
              return (
                <tr key={c.id} className={venceu?"highlight-row-red":""}>
                  <td style={{fontWeight:600,color:"var(--text)"}}>{c.cliente}</td>
                  <td style={{fontSize:12,color:"var(--text2)"}}>{aluno}</td>
                  <td style={{maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13}}>{c.descricao}</td>
                  <td><span style={{fontSize:11,background:"var(--bg3)",padding:"2px 8px",borderRadius:10,color:"var(--text2)"}}>{c.formaPagamento}</span></td>
                  <td style={{fontWeight:700,color:"var(--green)"}}>{fmt(c.valor)}</td>
                  <td>
                    <div>{fmtDate(c.vencimento)}</div>
                    {venceu&&<div style={{fontSize:11,color:"var(--red)"}}>Vencido há {Math.abs(d)}d</div>}
                  </td>
                  <td><span style={{fontSize:12,background:"var(--bg3)",padding:"2px 8px",borderRadius:20,color:"var(--accent2)"}}>{c.splits?.length||0} splits</span></td>
                  <td><StatusBadge s={c.status||"PENDING"}/></td>
                  <td>
                    <div className="action-group">
                      {c.status!=="RECEIVED"&&<button className="btn sm sec" title="Marcar como recebido" onClick={()=>marcarRecebido(c)}>✔</button>}
                      <button className="btn sm sec" title="Editar" onClick={()=>openEdit(c)}>✏️</button>
                      <button className="btn sm sec" title="Clonar" onClick={()=>openClone(c)}>📋</button>
                      <button className="btn sm danger" title="Excluir" onClick={()=>setConfirmDel(c)}>🗑️</button>
                    </div>
                  </td>
                </tr>
              );
            })}</tbody>
          </table>
          {lista.length===0&&<div className="empty-state">Nenhuma cobrança local encontrada</div>}
        </div>
      </div>
    </div>
  );
}

function Relatorios({receber,pagar,cobrancas,plano,subcontas,contasBancarias}) {
  const [tab,setTab]=useState("analitico-rec");
  const [periodo,setPeriodo]=useState("mes");
  const [periodoIni,setPeriodoIni]=useState("");
  const [periodoFim,setPeriodoFim]=useState("");
  const [vencIni,setVencIni]=useState("");
  const [vencFim,setVencFim]=useState("");
  const [selRec,setSelRec]=useState(new Set());
  const [selPag,setSelPag]=useState(new Set());
  const toggleSelR=(id)=>setSelRec(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});
  const toggleSelP=(id)=>setSelPag(p=>{const s=new Set(p);s.has(id)?s.delete(id):s.add(id);return s;});
  const toggleAllR=(lista)=>setSelRec(p=>{const all=lista.every(x=>p.has(x.id));const s=new Set(p);all?lista.forEach(x=>s.delete(x.id)):lista.forEach(x=>s.add(x.id));return s;});
  const toggleAllP=(lista)=>setSelPag(p=>{const all=lista.every(x=>p.has(x.id));const s=new Set(p);all?lista.forEach(x=>s.delete(x.id)):lista.forEach(x=>s.add(x.id));return s;});

  const cats3Rec=plano.filter(p=>p.nivel===3&&(p.tipo==="receber"||p.tipo==="ambos"));
  const cats3Pag=plano.filter(p=>p.nivel===3&&(p.tipo==="pagar"||p.tipo==="ambos"));

  // Filtra itens por período selecionado
  const getPeriodRange=()=>{
    const now=new Date();
    if(periodo==="custom") return {ini:periodoIni,fim:periodoFim};
    if(periodo==="mes"){const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,"0");return {ini:`${y}-${m}-01`,fim:`${y}-${m}-31`};}
    if(periodo==="trim"){const m=now.getMonth();const trimIni=new Date(now.getFullYear(),Math.floor(m/3)*3,1);const trimFim=new Date(now.getFullYear(),Math.floor(m/3)*3+3,0);return {ini:trimIni.toISOString().slice(0,10),fim:trimFim.toISOString().slice(0,10)};}
    if(periodo==="ano"){const y=now.getFullYear();return {ini:`${y}-01-01`,fim:`${y}-12-31`};}
    return {ini:"",fim:""};
  };
  const {ini:pIni,fim:pFim}=getPeriodRange();
  const inPeriod=(dt)=>{
    if(!dt) return true;
    const di=!pIni||dt>=pIni;
    const df=!pFim||dt<=pFim;
    return di&&df;
  };

  const recFilt=receber.filter(r=>r.status!=="cancelado"&&inPeriod(r.vencimento)&&(!vencIni||r.vencimento>=vencIni)&&(!vencFim||r.vencimento<=vencFim));
  const pagFilt=pagar.filter(p=>p.status!=="cancelado"&&inPeriod(p.vencimento)&&(!vencIni||p.vencimento>=vencIni)&&(!vencFim||p.vencimento<=vencFim));

  const totalRec=recFilt.reduce((a,b)=>a+b.valor,0);
  const recebido=recFilt.filter(r=>r.status==="recebido").reduce((a,b)=>a+b.valor,0);
  const totalPag=pagFilt.reduce((a,b)=>a+b.valor,0);
  const pago=pagFilt.filter(p=>p.status==="pago").reduce((a,b)=>a+b.valor,0);

  // Agrupa por categoria — inclui "Sem Categoria" para itens sem planoId
  const buildCatReport=(lista,cats,statusField,statusValue)=>{
    const rows=cats.map(c=>{
      const items=lista.filter(r=>+r.planoId===c.id);
      const receb=items.filter(r=>r.status===statusValue).reduce((a,b)=>a+b.valor,0);
      return {nome:c.nome,codigo:c.codigo,total:items.reduce((a,b)=>a+b.valor,0),qtd:items.length,recebido:receb};
    }).filter(c=>c.qtd>0);
    // Sem categoria
    const semCat=lista.filter(r=>!r.planoId||r.planoId===0||r.planoId==="");
    if(semCat.length>0){
      rows.push({nome:"Sem Categoria",codigo:"—",total:semCat.reduce((a,b)=>a+b.valor,0),qtd:semCat.length,recebido:semCat.filter(r=>r.status===statusValue).reduce((a,b)=>a+b.valor,0)});
    }
    return rows;
  };

  const recPorCat=buildCatReport(recFilt,cats3Rec,"status","recebido");
  const pagPorCat=buildCatReport(pagFilt,cats3Pag,"status","pago");

  const [fSplit,setFSplit]=useState("");

  const exportarRelPDF=(lista,tipo,sel)=>{
    const fonte=sel.size?lista.filter(x=>sel.has(x.id)):lista;
    if(!fonte.length){alert("Nenhum título para exportar.");return;}
    const eh_rec=tipo==="receber";
    const total=fonte.reduce((a,b)=>a+(+b.valor||0),0);
    const now=new Date().toLocaleDateString("pt-BR");
    const STATUS_PT={pendente:"Pendente",recebido:"Recebido",pago:"Pago",cancelado:"Cancelado"};
    const rows=fonte.map(x=>{
      const stPt=STATUS_PT[x.status]||x.status;
      const stColor={Pendente:"#e6a817",Recebido:"#3ecf8e",Pago:"#3ecf8e",Cancelado:"#999"}[stPt]||"#999";
      const cat=plano.find(p=>p.id==x.planoId);
      const venceu=x.status==="pendente"&&((new Date()-new Date(x.vencimento+"T12:00:00"))/(1000*86400))>0;
      const venc=x.vencimento?new Date(x.vencimento+"T12:00:00").toLocaleDateString("pt-BR"):"—";
      const dtPag=x.dataPagamento?new Date(x.dataPagamento+"T12:00:00").toLocaleDateString("pt-BR"):"—";
      const catTxt=cat?cat.codigo+" "+cat.nome:"Sem categoria";
      const pessoa=eh_rec?x.cliente:x.fornecedor;
      return "<tr><td>"+(x.descricao||"")+"</td><td>"+(pessoa||"")+"</td><td style='font-size:11px;color:#666'>"+catTxt+"</td><td style='color:"+(venceu?"#e74c3c":"inherit")+"'>"+venc+"</td><td style='color:"+(x.dataPagamento?"#27ae60":"#999")+"'>"+dtPag+"</td><td style='font-weight:700;color:"+(eh_rec?"#27ae60":"#e74c3c")+"'>R$ "+(+x.valor||0).toLocaleString("pt-BR",{minimumFractionDigits:2})+"</td><td><span style='padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:"+stColor+"22;color:"+stColor+"'>"+stPt+"</span></td></tr>";
    }).join("");
    const html="<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Relatório — "+now+"</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:12px;color:#222;padding:24px}h2{font-size:18px;margin-bottom:4px;color:#1a1a2e}.meta{font-size:11px;color:#666;margin-bottom:16px}table{width:100%;border-collapse:collapse}thead tr{background:#1a1a2e;color:#fff}th{padding:8px 10px;text-align:left;font-size:11px;font-weight:700}td{padding:7px 10px;border-bottom:1px solid #eee;vertical-align:middle}tr:nth-child(even) td{background:#f9f9f9}@media print{button{display:none}}</style></head><body><h2>Relatório Analítico — "+(eh_rec?"Contas a Receber":"Contas a Pagar")+"</h2><div class='meta'>Gerado em "+now+" · "+fonte.length+" título(s)"+(sel.size?" (selecionados)":"")+"</div><table><thead><tr><th>Descrição</th><th>"+(eh_rec?"Cliente":"Fornecedor")+"</th><th>Categoria</th><th>Vencimento</th><th>Dt. Pagamento</th><th>Valor</th><th>Status</th></tr></thead><tbody>"+rows+"</tbody><tfoot><tr style='border-top:2px solid #ccc'><td colspan='5' style='font-weight:700;padding:8px 10px'>TOTAL</td><td style='font-weight:800;padding:8px 10px;color:"+(eh_rec?"#27ae60":"#e74c3c")+"'>R$ "+total.toLocaleString("pt-BR",{minimumFractionDigits:2})+"</td><td></td></tr></tfoot></table><scr"+"ipt>window.onload=()=>window.print();</scr"+"ipt></body></html>";
    const w=window.open("","_blank","width=1100,height=800");w.document.write(html);w.document.close();
  };

  // ── Cobranças Asaas com splits ─────────────────────────────────────────────
  const splitLinhasAsaas=cobrancas
    .filter(c=>c.splits&&c.splits.length>0)
    .flatMap(c=>{
      const valorCob=parseFloat(c.valor)||0;
      const totalRepasse=c.splits.reduce((a,s)=>a+(s.splitType==="FIXED"?parseFloat(s.valor)||0:valorCob*((parseFloat(s.valor)||0)/100)),0);
      const valorPrincipal=valorCob-totalRepasse;
      return c.splits.map(s=>{
        const sub=subcontas.find(x=>x.walletId===s.walletId);
        const valorRepasse=s.splitType==="FIXED"?+s.valor||0:valorCob*((+s.valor||0)/100);
        const cb=(contasBancarias||[]).find(x=>x.id==-1); // Asaas
        return {
          cobId:c.id,fonte:"asaas",
          cliente:c.cliente||"—",
          descricao:c.descricao||"",
          status:c.status,
          valorCob,valorPrincipal,
          subNome:sub?.nome||s.walletId,
          walletId:s.walletId,
          valorRepasse,
          splitType:s.splitType,splitValor:s.valor,
          contaNome:cb?.banco||"Asaas",
          formaPagamento:c.tipo==="PIX"?"PIX":c.tipo==="BOLETO"?"Boleto":c.tipo==="CREDIT_CARD"?"Cartão":"—",
        };
      });
    });

  // ── Cobranças Locais: lê pagar com cobLocalId (splits) ───────────────────
  const splitLinhasLocal=(pagar||[])
    .filter(p=>p.cobLocalId&&p.descricao?.startsWith("Split"))
    .map(p=>{
      // Find matching receber for valor total da cobrança
      const rec=(receber||[]).find(r=>r.cobLocalId===p.cobLocalId);
      const valorCob=rec?.valor||p.valor||0;
      const contaBancaria=(contasBancarias||[]).find(x=>String(x.id)===String(p.contaBancariaId));
      return {
        cobId:p.cobLocalId,fonte:"local",
        cliente:rec?.cliente||p.observacao?.match(/Cliente: ([^·]+)/)?.[1]?.trim()||"—",
        descricao:rec?.descricao||p.descricao||"",
        status:p.status,
        valorCob,valorPrincipal:valorCob-p.valor,
        subNome:p.fornecedor||"—",
        walletId:"local",
        valorRepasse:p.valor,
        splitType:"FIXED",splitValor:p.valor,
        contaNome:contaBancaria?.banco||"—",
        formaPagamento:p.formaPagamento||"—",
      };
    });

  // ── Merge e filtro ────────────────────────────────────────────────────────
  const splitLinhasTodas=[...splitLinhasAsaas,...splitLinhasLocal];
  const splitLinhas=splitLinhasTodas.filter(s=>{
    if(!fSplit) return true;
    return s.subNome===fSplit||s.walletId===fSplit;
  });

  const totalRepGeral=splitLinhas.reduce((a,s)=>a+s.valorRepasse,0);
  const totalCobGeral=splitLinhas.reduce((a,s)=>a+s.valorCob,0);

  // ── EXPORT CSV ─────────────────────────────────────────────────────────────
  const exportCSV=()=>{
    let headers, rows, filename;
    if(tab==="split") {
      headers=["Fonte","Cliente","Descrição","Total Cobrança","Conta Principal","Beneficiário","Conta","Forma Pag.","Valor Repasse","Tipo Split","Status"];
      rows=splitLinhas.map(s=>[
        s.fonte==="asaas"?"Asaas":"Local",
        s.cliente,s.descricao,
        s.valorCob.toFixed(2),
        s.valorPrincipal.toFixed(2),
        s.subNome,s.contaNome||"",s.formaPagamento||"",
        s.valorRepasse.toFixed(2),
        s.splitType==="FIXED"?`R$ ${s.splitValor} fixo`:`${s.splitValor}%`,
        s.status
      ]);
      filename="divisao_pagamentos";
    } else if(tab==="analitico-rec"||tab==="analitico-pag") {
      const isRec=tab==="analitico-rec";
      const lista=isRec?recPorCat:pagPorCat;
      headers=["Código","Categoria","Qtd Títulos","Total Previsto",isRec?"Recebido":"Pago",isRec?"A Receber":"A Pagar","% Realizado"];
      rows=lista.map(c=>[
        c.codigo, c.nome, c.qtd,
        c.total.toFixed(2), c.recebido.toFixed(2),
        (c.total-c.recebido).toFixed(2),
        c.total>0?((c.recebido/c.total)*100).toFixed(1)+"%" : "0%"
      ]);
      filename=isRec?"analitico_receber":"analitico_pagar";
    } else {
      toast("⚠️ Use o botão de export PDF específico de cada aba");
      return;
    }
    const csv=[headers,...rows].map(r=>r.map(x=>`"${x}"`).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`${filename}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    toast("✅ CSV exportado!");
  };

  // ── EXPORT PDF ─────────────────────────────────────────────────────────────
  const exportPDF=()=>{
    let titulo, tableHeader, tableRows, totalRow;

    if(tab==="split") {
      titulo="Divisão de Pagamentos por Subconta";
      tableHeader=`<tr><th>Fonte</th><th>Cliente</th><th>Descrição</th><th>Total</th><th>Conta Principal</th><th>Beneficiário</th><th>Conta</th><th>Forma Pag.</th><th>Valor Repasse</th><th>Status</th></tr>`;
      tableRows=splitLinhas.map(s=>`<tr>
        <td><span style="padding:2px 7px;border-radius:8px;font-size:11px;font-weight:700;background:${s.fonte==="asaas"?"rgba(99,102,241,.2)":"rgba(62,207,142,.2)"};color:${s.fonte==="asaas"?"#6366f1":"#27ae60"}">${s.fonte==="asaas"?"Asaas":"Local"}</span></td>
        <td>${s.cliente}</td>
        <td style="font-size:11px;color:#666">${s.descricao}</td>
        <td>R$ ${s.valorCob.toFixed(2)}</td>
        <td>R$ ${s.valorPrincipal.toFixed(2)}</td>
        <td><strong>${s.subNome}</strong></td>
        <td style="font-size:11px">${s.contaNome||"—"}</td>
        <td style="font-size:11px">${s.formaPagamento||"—"}</td>
        <td><strong style="color:#e6a817">R$ ${s.valorRepasse.toFixed(2)}</strong></td>
        <td>${s.status}</td>
      </tr>`).join("");
      totalRow=`<tr style="font-weight:700;border-top:2px solid #ccc"><td colspan="3">TOTAL (${splitLinhas.length} repasses)</td>
        <td>R$ ${totalCobGeral.toFixed(2)}</td>
        <td>R$ ${splitLinhas.reduce((a,s)=>a+s.valorPrincipal,0).toFixed(2)}</td>
        <td colspan="3"></td>
        <td><strong>R$ ${totalRepGeral.toFixed(2)}</strong></td><td></td></tr>`;
    } else {
      const isRec=tab==="analitico-rec";
      const lista=isRec?recPorCat:pagPorCat;
      titulo=isRec?"Analítico — Contas a Receber":"Analítico — Contas a Pagar";
      tableHeader=`<tr><th>Código</th><th>Categoria</th><th>Qtd</th><th>Total</th><th>${isRec?"Recebido":"Pago"}</th><th>${isRec?"A Receber":"A Pagar"}</th><th>%</th></tr>`;
      tableRows=lista.map(c=>`<tr>
        <td>${c.codigo}</td><td>${c.nome}</td><td>${c.qtd}</td>
        <td>R$ ${c.total.toFixed(2)}</td><td>R$ ${c.recebido.toFixed(2)}</td>
        <td>R$ ${(c.total-c.recebido).toFixed(2)}</td>
        <td>${c.total>0?((c.recebido/c.total)*100).toFixed(1):0}%</td>
      </tr>`).join("");
      totalRow=`<tr><td colspan="2">TOTAL</td><td>${lista.reduce((a,c)=>a+c.qtd,0)}</td>
        <td>R$ ${lista.reduce((a,c)=>a+c.total,0).toFixed(2)}</td>
        <td>R$ ${lista.reduce((a,c)=>a+c.recebido,0).toFixed(2)}</td>
        <td>R$ ${lista.reduce((a,c)=>a+(c.total-c.recebido),0).toFixed(2)}</td>
        <td>${lista.reduce((a,c)=>a+c.total,0)>0?((lista.reduce((a,c)=>a+c.recebido,0)/lista.reduce((a,c)=>a+c.total,0))*100).toFixed(1):0}%</td></tr>`;
    }

    const html=`<html><head><meta charset="UTF-8"><title>${titulo}</title>
      <style>body{font-family:Arial,sans-serif;font-size:12px;padding:20px}
      h2{color:#1a1a2e;border-bottom:2px solid #1a1a2e;padding-bottom:8px}
      table{width:100%;border-collapse:collapse}
      th{background:#1a1a2e;color:#fff;padding:8px;text-align:left}
      td{padding:6px 8px;border-bottom:1px solid #ddd}
      tfoot td{font-weight:bold;border-top:2px solid #333;background:#f5f5f5}
      .info{color:#666;font-size:11px;margin-bottom:16px}
      </style></head><body>
      <h2>GestãoAsaas — ${titulo}</h2>
      <p class="info">Gerado em ${new Date().toLocaleDateString("pt-BR")} · Período: ${pIni||"—"} a ${pFim||"—"}</p>
      <table><thead>${tableHeader}</thead><tbody>${tableRows}</tbody><tfoot>${totalRow}</tfoot></table>
      </body></html>`;
    const w=window.open("","_blank");
    w.document.write(html);
    w.document.close();
    w.print();
  };

  return (
    <div>
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <Sel label="" value={periodo} onChange={e=>setPeriodo(e.target.value)} style={{width:200}}>
          <option value="mes">Este mês</option>
          <option value="trim">Trimestre</option>
          <option value="ano">Ano atual</option>
          <option value="custom">Período personalizado</option>
        </Sel>
        {periodo==="custom" && (
          <>
            <Inp label="" type="date" value={periodoIni} onChange={e=>setPeriodoIni(e.target.value)} style={{width:160}}/>
            <Inp label="" type="date" value={periodoFim} onChange={e=>setPeriodoFim(e.target.value)} style={{width:160}}/>
          </>
        )}
        <button className="btn sm sec" onClick={exportCSV}>⬇ Exportar CSV</button>
        <button className="btn sm sec" onClick={exportPDF}>⬇ Exportar PDF</button>
      </div>

      <div className="stats-grid" style={{marginBottom:20}}>
        {[
          {l:"A Receber (total)",v:fmt(totalRec),c:"var(--green)"},
          {l:"Recebido",v:fmt(recebido),c:"var(--green)"},
          {l:"A Pagar (total)",v:fmt(totalPag),c:"var(--red)"},
          {l:"Resultado Líquido",v:fmt(recebido-pago),c:recebido-pago>=0?"var(--green)":"var(--red)"},
        ].map((s,i)=>(
          <div className="stat-card" key={i}>
            <div className="stat-label">{s.l}</div>
            <div className="stat-value" style={{fontSize:20,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      <div className="tabs">
        <div className={`tab ${tab==="analitico-rec"?"active":""}`} onClick={()=>setTab("analitico-rec")}>Analítico — Receber</div>
        <div className={`tab ${tab==="analitico-pag"?"active":""}`} onClick={()=>setTab("analitico-pag")}>Analítico — Pagar</div>
        <div className={`tab ${tab==="split"?"active":""}`} onClick={()=>setTab("split")}>Divisão de Pagamentos</div>
        <div className={`tab ${tab==="sintese"?"active":""}`} onClick={()=>setTab("sintese")}>Síntese</div>
        <div className={`tab ${tab==="dre"?"active":""}`} onClick={()=>setTab("dre")}>DRE</div>
      </div>

      {tab==="analitico-rec" && (
        <div className="card">
          <div className="card-header">
            <div>
              <div className="card-title">Relatório Analítico — Contas a Receber</div>
              <div style={{fontSize:12,color:"var(--text3)"}}>{recFilt.length} títulos · {fmt(totalRec)}</div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,color:"var(--text3)"}}>Vencimento:</span>
              <input type="date" className="form-input" style={{height:32,width:140,fontSize:12}} value={vencIni} onChange={e=>setVencIni(e.target.value)}/>
              <span style={{fontSize:11,color:"var(--text3)"}}>até</span>
              <input type="date" className="form-input" style={{height:32,width:140,fontSize:12}} value={vencFim} onChange={e=>setVencFim(e.target.value)}/>
              {(vencIni||vencFim)&&<button className="btn sm sec" onClick={()=>{setVencIni("");setVencFim("");}}>✕</button>}
              {selRec.size>0&&<button className="btn sec" style={{color:"var(--accent2)"}} onClick={()=>exportarRelPDF(recFilt,"receber",selRec)}>📄 Exportar {selRec.size} sel.</button>}
              <button className="btn sec" onClick={()=>exportarRelPDF(recFilt,"receber",new Set())}>📄 Exportar todos</button>
            </div>
          </div>
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style={{width:36,textAlign:"center"}}>
                    <input type="checkbox" checked={recFilt.length>0&&recFilt.every(x=>selRec.has(x.id))} onChange={()=>toggleAllR(recFilt)} style={{cursor:"pointer"}}/>
                  </th>
                  <th>Descrição</th>
                  <th>Cliente</th>
                  <th>Categoria</th>
                  <th>Vencimento</th>
                  <th>Dt. Pagamento</th>
                  <th>Valor</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {recFilt.length===0&&<tr><td colSpan={8} style={{textAlign:"center",color:"var(--text3)"}}>Nenhum dado neste período</td></tr>}
                {recFilt.sort((a,b)=>a.vencimento?.localeCompare(b.vencimento||"")||0).map((r,i)=>{
                  const cat=plano.find(p=>p.id==r.planoId);
                  const venceu=r.status==="pendente"&&daysFromNow(r.vencimento)<0;
                  return (
                    <tr key={i} style={{background:selRec.has(r.id)?"rgba(108,99,255,.08)":venceu?"rgba(240,101,101,.05)":""}}>
                      <td style={{textAlign:"center"}}><input type="checkbox" checked={selRec.has(r.id)} onChange={()=>toggleSelR(r.id)} style={{cursor:"pointer"}}/></td>
                      <td style={{fontWeight:500,color:"var(--text)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.descricao||"—"}</td>
                      <td style={{color:"var(--text2)",fontWeight:600}}>{r.cliente||"—"}</td>
                      <td>
                        {cat
                          ? <span><code style={{fontSize:10,color:"var(--accent2)"}}>{cat.codigo}</code> {cat.nome}</span>
                          : <span style={{color:"var(--text3)",fontSize:12}}>Sem categoria</span>}
                      </td>
                      <td style={{color:venceu?"var(--red)":"var(--text2)",fontWeight:venceu?700:400}}>
                        {fmtDate(r.vencimento)}
                        {venceu&&<div style={{fontSize:10,color:"var(--red)"}}>Vencido</div>}
                      </td>
                      <td style={{color:"var(--text3)",fontSize:12}}>{r.dataPagamento?fmtDate(r.dataPagamento):"—"}</td>
                      <td style={{fontWeight:700,color:r.status==="recebido"?"var(--green)":"var(--text)"}}>{fmt(r.valor)}</td>
                      <td><StatusBadge s={r.status}/></td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:"2px solid var(--border)"}}>
                  <td/>
                  <td colSpan={5} style={{fontWeight:700,color:"var(--text)"}}>TOTAL ({recFilt.length} títulos)</td>
                  <td style={{fontWeight:800,color:"var(--green)"}}>{fmt(totalRec)}</td>
                  <td style={{fontSize:12,color:"var(--text3)"}}>{fmt(recebido)} recebido · {fmt(totalRec-recebido)} pendente</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}

      {tab==="analitico-pag" && (
        <div className="card">
          <div className="card-header">
            <div>
              <div className="card-title">Relatório Analítico — Contas a Pagar</div>
              <div style={{fontSize:12,color:"var(--text3)"}}>{pagFilt.length} títulos · {fmt(totalPag)}</div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,color:"var(--text3)"}}>Vencimento:</span>
              <input type="date" className="form-input" style={{height:32,width:140,fontSize:12}} value={vencIni} onChange={e=>setVencIni(e.target.value)}/>
              <span style={{fontSize:11,color:"var(--text3)"}}>até</span>
              <input type="date" className="form-input" style={{height:32,width:140,fontSize:12}} value={vencFim} onChange={e=>setVencFim(e.target.value)}/>
              {(vencIni||vencFim)&&<button className="btn sm sec" onClick={()=>{setVencIni("");setVencFim("");}}>✕</button>}
              {selPag.size>0&&<button className="btn sec" style={{color:"var(--accent2)"}} onClick={()=>exportarRelPDF(pagFilt,"pagar",selPag)}>📄 Exportar {selPag.size} sel.</button>}
              <button className="btn sec" onClick={()=>exportarRelPDF(pagFilt,"pagar",new Set())}>📄 Exportar todos</button>
            </div>
          </div>
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style={{width:36,textAlign:"center"}}>
                    <input type="checkbox" checked={pagFilt.length>0&&pagFilt.every(x=>selPag.has(x.id))} onChange={()=>toggleAllP(pagFilt)} style={{cursor:"pointer"}}/>
                  </th>
                  <th>Descrição</th>
                  <th>Fornecedor</th>
                  <th>Categoria</th>
                  <th>Vencimento</th>
                  <th>Dt. Pagamento</th>
                  <th>Valor</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {pagFilt.length===0&&<tr><td colSpan={8} style={{textAlign:"center",color:"var(--text3)"}}>Nenhum dado neste período</td></tr>}
                {pagFilt.sort((a,b)=>a.vencimento?.localeCompare(b.vencimento||"")||0).map((p,i)=>{
                  const cat=plano.find(x=>x.id==p.planoId);
                  const venceu=p.status==="pendente"&&daysFromNow(p.vencimento)<0;
                  return (
                    <tr key={i} style={{background:selPag.has(p.id)?"rgba(108,99,255,.08)":venceu?"rgba(240,101,101,.05)":""}}>
                      <td style={{textAlign:"center"}}><input type="checkbox" checked={selPag.has(p.id)} onChange={()=>toggleSelP(p.id)} style={{cursor:"pointer"}}/></td>
                      <td style={{fontWeight:500,color:"var(--text)",maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                        <div>{p.descricao||"—"}</div>
                        {p.totalParcelas&&<div style={{fontSize:10,color:"var(--accent2)"}}>Parcela {p.parcela}/{p.totalParcelas}</div>}
                      </td>
                      <td style={{color:"var(--text2)",fontWeight:600}}>{p.fornecedor||"—"}</td>
                      <td>
                        {cat
                          ? <span><code style={{fontSize:10,color:"var(--accent2)"}}>{cat.codigo}</code> {cat.nome}</span>
                          : <span style={{color:"var(--text3)",fontSize:12}}>Sem categoria</span>}
                      </td>
                      <td style={{color:venceu?"var(--red)":"var(--text2)",fontWeight:venceu?700:400}}>
                        {fmtDate(p.vencimento)}
                        {venceu&&<div style={{fontSize:10,color:"var(--red)"}}>Vencido</div>}
                      </td>
                      <td style={{color:"var(--text3)",fontSize:12}}>{p.dataPagamento?fmtDate(p.dataPagamento):"—"}</td>
                      <td style={{fontWeight:700,color:p.status==="pago"?"var(--green)":"var(--red)"}}>{fmt(p.valor)}</td>
                      <td><StatusBadge s={p.status}/></td>
                    </tr>
                  );
                })}
              </tbody>
              <tfoot>
                <tr style={{borderTop:"2px solid var(--border)"}}>
                  <td/>
                  <td colSpan={5} style={{fontWeight:700,color:"var(--text)"}}>TOTAL ({pagFilt.length} títulos)</td>
                  <td style={{fontWeight:800,color:"var(--red)"}}>{fmt(totalPag)}</td>
                  <td style={{fontSize:12,color:"var(--text3)"}}>{fmt(pago)} pago · {fmt(totalPag-pago)} pendente</td>
                </tr>
              </tfoot>
            </table>
          </div>
        </div>
      )}

      {tab==="split" && (
        <div className="card">
          <div className="card-header">
            <div className="card-title">Divisão de Pagamentos por Subconta</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,color:"var(--text3)"}}>Filtrar subconta:</span>
              <select className="form-input" style={{width:220,fontSize:13,padding:"5px 10px"}} value={fSplit} onChange={e=>setFSplit(e.target.value)}>
                <option value="">Todos os beneficiários</option>
                {subcontas.map(s=><option key={s.id} value={s.walletId}>{s.nome}</option>)}
                {[...new Set(splitLinhasLocal.map(s=>s.subNome))].filter(n=>n&&n!=="—"&&!subcontas.find(x=>x.nome===n)).map(n=><option key={n} value={n}>{n} (local)</option>)}
              </select>
              {fSplit&&<button className="btn sm sec" onClick={()=>setFSplit("")}>✕ Limpar</button>}
            </div>
          </div>
          <div className="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Fonte</th>
                  <th>Cliente</th>
                  <th>Descrição</th>
                  <th>Total</th>
                  <th>Conta Principal</th>
                  <th>Beneficiário</th>
                  <th>Conta</th>
                  <th>Forma Pag.</th>
                  <th>Valor Repasse</th>
                  <th>Tipo</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                {splitLinhas.length===0&&(
                  <tr><td colSpan={8} style={{textAlign:"center",color:"var(--text3)",padding:24}}>
                    {fSplit?"Nenhuma cobrança para esta subconta.":"Nenhuma cobrança com split cadastrada."}
                  </td></tr>
                )}
                {splitLinhas.map((s,i)=>(
                  <tr key={i}>
                    <td>
                      <span style={{fontSize:10,padding:"2px 7px",borderRadius:8,fontWeight:700,
                        background:s.fonte==="asaas"?"rgba(99,102,241,.15)":"rgba(62,207,142,.12)",
                        color:s.fonte==="asaas"?"var(--accent2)":"var(--green)"}}>
                        {s.fonte==="asaas"?"Asaas":"Local"}
                      </span>
                    </td>
                    <td style={{fontWeight:600,color:"var(--text)"}}>{s.cliente}</td>
                    <td style={{maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:12,color:"var(--text3)"}}>{s.descricao}</td>
                    <td style={{fontWeight:700}}>{fmt(s.valorCob)}</td>
                    <td style={{color:"var(--accent)"}}>{fmt(s.valorPrincipal)}</td>
                    <td style={{fontWeight:600,color:"var(--text2)"}}>{s.subNome}</td>
                    <td style={{fontSize:12,color:"var(--text3)"}}>{s.contaNome||"—"}</td>
                    <td><span style={{fontSize:11,background:"var(--bg3)",padding:"2px 7px",borderRadius:10,color:"var(--text2)"}}>{s.formaPagamento||"—"}</span></td>
                    <td style={{fontWeight:700,color:"var(--yellow)"}}>{fmt(s.valorRepasse)}</td>
                    <td style={{fontSize:11}}>
                      <span style={{background:"var(--bg3)",padding:"2px 8px",borderRadius:10,color:"var(--text3)"}}>
                        {s.splitType==="FIXED"?`R$ ${typeof s.splitValor==="number"?fmt(s.splitValor):s.splitValor} fixo`:`${s.splitValor}%`}
                      </span>
                    </td>
                    <td><StatusBadge s={s.status}/></td>
                  </tr>
                ))}
              </tbody>
              {splitLinhas.length>0&&(
                <tfoot>
                  <tr style={{borderTop:"2px solid var(--border)"}}>
                    <td colSpan={3} style={{fontWeight:700,color:"var(--text)"}}>TOTAL ({splitLinhas.length} repasses)</td>
                    <td style={{fontWeight:700}}>{fmt(totalCobGeral)}</td>
                    <td style={{fontWeight:700,color:"var(--accent)"}}>{fmt(splitLinhas.reduce((a,s)=>a+s.valorPrincipal,0))}</td>
                    <td colSpan={3}></td>
                    <td style={{fontWeight:700,color:"var(--yellow)"}}>{fmt(totalRepGeral)}</td>
                    <td colSpan={2}></td>
                  </tr>
                </tfoot>
              )}
            </table>
          </div>
        </div>
      )}

      {tab==="dre" && <DRE receber={receber} pagar={pagar} plano={plano} periodoIniExt={pIni} periodoFimExt={pFim}/>}

    </div>
  );
}

// ─── DRE ─────────────────────────────────────────────────────────────────────
function DRE({receber,pagar,plano,periodoIniExt,periodoFimExt}) {
  const [criterio,setCriterio]=useState("competencia");
  const [periodoIni,setPeriodoIni]=useState("");
  const [periodoFim,setPeriodoFim]=useState("");

  // Usa período herdado do pai (filtro de Relatórios) quando não tem personalizado
  const pIni=periodoIni||periodoIniExt||"";
  const pFim=periodoFim||periodoFimExt||"";

  const filtrarRec=(items)=>items.filter(r=>{
    if(r.status==="cancelado") return false;
    const dtBase=criterio==="caixa"?r.dataPagamento||r.vencimento:r.vencimento;
    const di=!pIni||dtBase>=pIni;
    const df=!pFim||dtBase<=pFim;
    return di&&df;
  });
  const filtrarPag=(items)=>items.filter(p=>{
    if(p.status==="cancelado") return false;
    const dtBase=criterio==="caixa"?p.dataPagamento||p.vencimento:p.vencimento;
    const di=!pIni||dtBase>=pIni;
    const df=!pFim||dtBase<=pFim;
    return di&&df;
  });

  const recFilt=criterio==="caixa"?filtrarRec(receber).filter(r=>r.status==="recebido"):filtrarRec(receber);
  const pagFilt=criterio==="caixa"?filtrarPag(pagar).filter(p=>p.status==="pago"):filtrarPag(pagar);

  const nivel1Rec=plano.filter(p=>p.nivel===1&&(p.tipo==="receber"||p.tipo==="ambos"));
  const nivel1Pag=plano.filter(p=>p.nivel===1&&(p.tipo==="pagar"||p.tipo==="ambos"));

  // Soma por cat3 — compara com == para tolerância de tipo (string vs number)
  const getRecCat=(cat3Id)=>recFilt.filter(r=>r.planoId==cat3Id).reduce((a,b)=>a+b.valor,0);
  const getPagCat=(cat3Id)=>pagFilt.filter(p=>p.planoId==cat3Id).reduce((a,b)=>a+b.valor,0);

  const buildTree=(nivel1List,getter)=>
    nivel1List.map(n1=>{
      const grupos=plano.filter(p=>p.nivel===2&&p.pai===n1.id);
      const gruposData=grupos.map(n2=>{
        const cats=plano.filter(p=>p.nivel===3&&p.pai===n2.id);
        const catsData=cats.map(n3=>({...n3,total:getter(n3.id)})).filter(c=>c.total>0);
        return {...n2,cats:catsData,total:catsData.reduce((a,c)=>a+c.total,0)};
      }).filter(g=>g.total>0);
      return {...n1,grupos:gruposData,total:gruposData.reduce((a,g)=>a+g.total,0)};
    }).filter(n=>n.total>0);

  const treeRec=buildTree(nivel1Rec,getRecCat);
  const treePag=buildTree(nivel1Pag,getPagCat);

  // Itens sem categoria (planoId null/0/"")
  const recSemCat=recFilt.filter(r=>!r.planoId||r.planoId===0||r.planoId==="").reduce((a,b)=>a+b.valor,0);
  const pagSemCat=pagFilt.filter(p=>!p.planoId||p.planoId===0||p.planoId==="").reduce((a,b)=>a+b.valor,0);

  const totalReceita=treeRec.reduce((a,n)=>a+n.total,0)+recSemCat;
  const totalDespesa=treePag.reduce((a,n)=>a+n.total,0)+pagSemCat;
  const resultado=totalReceita-totalDespesa;
  const margemBruta=totalReceita>0?((resultado/totalReceita)*100).toFixed(1):"0.0";

  const rowStyle=(nivel)=>({
    display:"flex",justifyContent:"space-between",alignItems:"center",
    padding:nivel===1?"14px 16px":nivel===2?"10px 16px 10px 32px":"8px 16px 8px 52px",
    borderBottom:"1px solid var(--border)",
    background:nivel===1?"var(--bg3)":nivel===2?"var(--surface2)":"transparent",
    fontWeight:nivel===1?800:nivel===2?600:400,
    fontSize:nivel===1?14:nivel===2?13:12.5,
    color:nivel===1?"var(--text)":nivel===2?"var(--text2)":"var(--text3)",
  });

  // ── EXPORT PDF DRE ─────────────────────────────────────────────────────────
  const exportDREPDF=()=>{
    let recRows="";
    treeRec.forEach(n1=>{
      recRows+=`<tr style="background:#1a2a1a"><td colspan="2" style="font-weight:800;color:#4ade80;padding:8px">${n1.codigo} — ${n1.nome}</td><td style="color:#4ade80;font-weight:800;text-align:right;padding:8px">R$ ${n1.total.toFixed(2)}</td></tr>`;
      n1.grupos.forEach(n2=>{
        recRows+=`<tr style="background:#111"><td style="padding:6px 8px 6px 20px;font-weight:600">${n2.codigo} — ${n2.nome}</td><td></td><td style="text-align:right;padding:6px 8px;font-weight:600">R$ ${n2.total.toFixed(2)}</td></tr>`;
        n2.cats.forEach(n3=>{
          recRows+=`<tr><td style="padding:5px 8px 5px 36px;font-size:11px;color:#888">${n3.codigo} — ${n3.nome}</td><td></td><td style="text-align:right;padding:5px 8px;font-size:11px">R$ ${n3.total.toFixed(2)}</td></tr>`;
        });
      });
    });
    if(recSemCat>0) recRows+=`<tr><td style="padding:5px 8px 5px 20px;font-size:11px;color:#888">— Sem Categoria</td><td></td><td style="text-align:right;padding:5px 8px;font-size:11px">R$ ${recSemCat.toFixed(2)}</td></tr>`;

    let pagRows="";
    treePag.forEach(n1=>{
      pagRows+=`<tr style="background:#2a1a1a"><td colspan="2" style="font-weight:800;color:#f87171;padding:8px">${n1.codigo} — ${n1.nome}</td><td style="color:#f87171;font-weight:800;text-align:right;padding:8px">(R$ ${n1.total.toFixed(2)})</td></tr>`;
      n1.grupos.forEach(n2=>{
        pagRows+=`<tr style="background:#111"><td style="padding:6px 8px 6px 20px;font-weight:600">${n2.codigo} — ${n2.nome}</td><td></td><td style="text-align:right;padding:6px 8px;font-weight:600">(R$ ${n2.total.toFixed(2)})</td></tr>`;
        n2.cats.forEach(n3=>{
          pagRows+=`<tr><td style="padding:5px 8px 5px 36px;font-size:11px;color:#888">${n3.codigo} — ${n3.nome}</td><td></td><td style="text-align:right;padding:5px 8px;font-size:11px">(R$ ${n3.total.toFixed(2)})</td></tr>`;
        });
      });
    });
    if(pagSemCat>0) pagRows+=`<tr><td style="padding:5px 8px 5px 20px;font-size:11px;color:#888">— Sem Categoria</td><td></td><td style="text-align:right;padding:5px 8px;font-size:11px">(R$ ${pagSemCat.toFixed(2)})</td></tr>`;

    const resColor=resultado>=0?"#4ade80":"#f87171";
    const html=`<html><head><meta charset="UTF-8"><title>DRE</title>
    <style>
      body{font-family:Arial,sans-serif;font-size:12px;padding:24px;background:#0f1117;color:#e2e8f0}
      h2{color:#e2e8f0;border-bottom:2px solid #334;padding-bottom:8px}
      .info{color:#64748b;font-size:11px;margin-bottom:16px}
      table{width:100%;border-collapse:collapse;margin-bottom:16px}
      tr{border-bottom:1px solid #1e293b}
      .resultado{display:flex;justify-content:space-between;padding:16px;border-radius:8px;margin-top:16px;font-size:18px;font-weight:800}
      @media print{body{background:#fff;color:#000}.resultado{border:2px solid #333}}
    </style></head><body>
    <h2>DRE — Demonstrativo de Resultado do Exercício</h2>
    <p class="info">Critério: ${criterio==="caixa"?"Caixa (Recebido/Pago)":"Competência (data de vencimento)"} · Período: ${pIni||"—"} a ${pFim||"—"} · Gerado em ${new Date().toLocaleDateString("pt-BR")}</p>
    <table>
      <tr style="background:#0d2010"><td colspan="3" style="padding:10px;font-weight:700;font-size:13px;color:#4ade80">( + ) RECEITAS OPERACIONAIS — R$ ${totalReceita.toFixed(2)}</td></tr>
      ${recRows}
      <tr style="background:#200d0d"><td colspan="3" style="padding:10px;font-weight:700;font-size:13px;color:#f87171">( - ) DESPESAS OPERACIONAIS — (R$ ${totalDespesa.toFixed(2)})</td></tr>
      ${pagRows}
    </table>
    <div class="resultado" style="background:${resultado>=0?"#0d2010":"#200d0d"};color:${resColor}">
      <span>( = ) ${resultado>=0?"LUCRO DO EXERCÍCIO":"PREJUÍZO DO EXERCÍCIO"}</span>
      <span>${resultado>=0?"":"- "}R$ ${Math.abs(resultado).toFixed(2)}</span>
    </div>
    <p style="font-size:10px;color:#64748b;margin-top:8px">Margem líquida: ${margemBruta}% · Regime de ${criterio==="caixa"?"caixa":"competência"}</p>
    </body></html>`;
    const w=window.open("","_blank");
    w.document.write(html);
    w.document.close();
    w.print();
  };

  return (
    <div>
      {/* Controles */}
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,background:"var(--bg3)",padding:4,borderRadius:10}}>
          {[["competencia","📅 Competência"],["caixa","💰 Caixa (Recebido/Pago)"]].map(([v,l])=>(
            <button key={v} onClick={()=>setCriterio(v)} style={{padding:"7px 16px",borderRadius:7,cursor:"pointer",fontFamily:"var(--font-body)",fontSize:12.5,fontWeight:600,border:"none",transition:"all .15s",background:criterio===v?"var(--surface2)":"transparent",color:criterio===v?"var(--text)":"var(--text3)"}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--text3)"}}>
          <span>De:</span>
          <input type="date" className="form-input" style={{width:160,fontSize:12}} value={periodoIni} onChange={e=>setPeriodoIni(e.target.value)}/>
          <span>Até:</span>
          <input type="date" className="form-input" style={{width:160,fontSize:12}} value={periodoFim} onChange={e=>setPeriodoFim(e.target.value)}/>
          <button className="btn sm sec" onClick={()=>{setPeriodoIni("");setPeriodoFim("");}}>Limpar</button>
        </div>
        <button className="btn sm sec" onClick={exportDREPDF}>⬇ Exportar PDF</button>
      </div>

      {/* Cards resumo */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:16,marginBottom:20}}>
        {[
          {l:"Receita Total",v:fmt(totalReceita),c:"var(--green)"},
          {l:"Despesa Total",v:fmt(totalDespesa),c:"var(--red)"},
          {l:"Resultado",v:fmt(resultado),c:resultado>=0?"var(--green)":"var(--red)"},
          {l:"Margem Líquida",v:`${margemBruta}%`,c:resultado>=0?"var(--green)":"var(--red)"},
        ].map((s,i)=>(
          <div key={i} style={{background:"var(--bg3)",borderRadius:12,padding:"16px 20px"}}>
            <div style={{fontSize:11,color:"var(--text3)",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{s.l}</div>
            <div style={{fontFamily:"var(--font-head)",fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Árvore DRE */}
      <div style={{background:"var(--surface2)",borderRadius:16,overflow:"hidden",border:"1px solid var(--border)"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between"}}>
          <div>
            <div style={{fontWeight:800,fontSize:16}}>DRE – Demonstrativo de Resultado do Exercício</div>
            <div style={{fontSize:12,color:"var(--accent)",marginTop:2}}>Critério: {criterio==="caixa"?"Caixa (Recebido/Pago)":"Competência (data de vencimento)"}</div>
          </div>
          <div style={{fontSize:12,color:"var(--text3)"}}>Gerado em {new Date().toLocaleDateString("pt-BR")}</div>
        </div>

        {/* RECEITAS */}
        <div style={{...rowStyle(1),color:"var(--green)"}}>
          <span>( + ) RECEITAS OPERACIONAIS</span>
          <span>{fmt(totalReceita)}</span>
        </div>
        {treeRec.map(n1=>(
          <div key={n1.id}>
            <div style={rowStyle(2)}>
              <span>↳ {n1.codigo} — {n1.nome}</span>
              <span style={{color:"var(--green)"}}>{fmt(n1.total)}</span>
            </div>
            {n1.grupos.map(n2=>(
              <div key={n2.id}>
                {n2.cats.map(n3=>(
                  <div key={n3.id} style={rowStyle(3)}>
                    <span>{n3.codigo} — {n3.nome}</span>
                    <span>{fmt(n3.total)}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        ))}
        {recSemCat>0&&(
          <div style={{...rowStyle(3),color:"var(--text3)"}}>
            <span>— Sem Categoria</span>
            <span>{fmt(recSemCat)}</span>
          </div>
        )}

        {/* DESPESAS */}
        <div style={{...rowStyle(1),color:"var(--red)",marginTop:4}}>
          <span>( - ) DESPESAS OPERACIONAIS</span>
          <span>({fmt(totalDespesa)})</span>
        </div>
        {treePag.map(n1=>(
          <div key={n1.id}>
            <div style={rowStyle(2)}>
              <span>↳ {n1.codigo} — {n1.nome}</span>
              <span style={{color:"var(--red)"}}>({fmt(n1.total)})</span>
            </div>
            {n1.grupos.map(n2=>(
              <div key={n2.id}>
                {n2.cats.map(n3=>(
                  <div key={n3.id} style={rowStyle(3)}>
                    <span>{n3.codigo} — {n3.nome}</span>
                    <span>({fmt(n3.total)})</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        ))}
        {pagSemCat>0&&(
          <div style={{...rowStyle(3),color:"var(--text3)"}}>
            <span>— Sem Categoria</span>
            <span>({fmt(pagSemCat)})</span>
          </div>
        )}

        {/* RESULTADO */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 16px",background:resultado>=0?"rgba(74,222,128,0.08)":"rgba(248,113,113,0.08)",borderTop:"2px solid "+(resultado>=0?"var(--green)":"var(--red)")}}>
          <div>
            <div style={{fontWeight:900,fontSize:16,color:resultado>=0?"var(--green)":"var(--red)"}}>
              ( = ) {resultado>=0?"LUCRO DO EXERCÍCIO":"PREJUÍZO DO EXERCÍCIO"}
            </div>
            <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>Margem liquida: {margemBruta}% · Regime de {criterio==="caixa"?"caixa":"competência"}</div>
          </div>
          <div style={{fontFamily:"var(--font-head)",fontSize:32,fontWeight:900,color:resultado>=0?"var(--green)":"var(--red)"}}>
            {resultado>=0?"":"-"} {fmt(Math.abs(resultado))}
          </div>
        </div>
      </div>
    </div>
  );
}
