const StatusBadge = ({s}) => {
  const m = {
    PENDING:["b-yellow","Pendente"],RECEIVED:["b-green","Recebido"],OVERDUE:["b-red","Vencido"],
    ACTIVE:["b-green","Ativa"],ativo:["b-green","Ativo"],inativo:["b-gray","Inativo"],bloqueado:["b-red","Bloqueado"],
    pendente:["b-yellow","Pendente"],recebido:["b-green","Recebido"],pago:["b-green","Pago"],
    cancelado:["b-red","Cancelado"],BOLETO:["b-blue","Boleto"],PIX:["b-green","Pix"],
    CREDIT_CARD:["b-orange","Cartão"],EMITIDA:["b-green","Emitida"],CANCELADA:["b-red","Cancelada"],
  };
  const [cls,label]=m[s]||["b-gray",s];
  return <span className={`badge ${cls}`}><span className="badge-dot"/>{label}</span>;
};

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({receber,pagar}) {
  const now = new Date(); now.setHours(0,0,0,0);
  const [mes, setMes] = useState(today.getMonth());
  const [ano, setAno] = useState(today.getFullYear());

  const mesNomes = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

  const next7Rec = receber.filter(r=>{
    if(r.status==="recebido"||r.status==="cancelado") return false;
    const d=daysFromNow(r.vencimento); return d>=0&&d<=7;
  }).sort((a,b)=>a.vencimento.localeCompare(b.vencimento));

  const next7Pag = pagar.filter(r=>{
    if(r.status==="pago"||r.status==="cancelado") return false;
    const d=daysFromNow(r.vencimento); return d>=0&&d<=7;
  }).sort((a,b)=>a.vencimento.localeCompare(b.vencimento));

  const totalRec = receber.filter(r=>r.status!=="cancelado").reduce((a,b)=>a+b.valor,0);
  const totalPag = pagar.filter(p=>p.status!=="cancelado").reduce((a,b)=>a+b.valor,0);
  const recebido = receber.filter(r=>r.status==="recebido").reduce((a,b)=>a+b.valor,0);

  const months=["Set","Out","Nov","Dez","Jan","Fev"];
  const rv=[65,80,55,90,70,95],pv=[40,55,45,60,50,70],mx=Math.max(...rv,...pv);

  return (
    <div>
      {/* Filtro de período */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:24}}>
        <span style={{fontSize:13,color:"var(--text3)"}}>Período:</span>
        <select className="form-input" style={{width:160}} value={mes} onChange={e=>setMes(+e.target.value)}>
          {mesNomes.map((m,i)=><option key={i} value={i}>{m}</option>)}
        </select>
        <select className="form-input" style={{width:100}} value={ano} onChange={e=>setAno(+e.target.value)}>
          {[2024,2025,2026].map(y=><option key={y}>{y}</option>)}
        </select>
        <span className="badge b-blue">{mesNomes[mes]}/{ano}</span>
      </div>

      <div className="stats-grid">
        {[
          {label:"A Receber",value:fmt(totalRec-recebido),c:"var(--green)"},
          {label:"Já Recebido",value:fmt(recebido),c:"var(--green)"},
          {label:"A Pagar",value:fmt(totalPag),c:"var(--red)"},
          {label:"Saldo Projetado",value:fmt(recebido-totalPag),c:"var(--accent2)"},
        ].map((s,i)=>(
          <div className="stat-card" key={i}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value" style={{fontSize:22,color:s.c}}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Próximos 7 dias */}
      <div className="two-col" style={{marginBottom:20}}>
        <div className="card">
          <div className="card-header">
            <div><div className="card-title">📥 A Receber — Próx. 7 dias</div><div className="card-sub">{next7Rec.length} título(s) em aberto</div></div>
          </div>
          {next7Rec.length===0 ? <div className="empty-state">Nenhum título nos próximos 7 dias</div> : (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {next7Rec.map(r=>{
                const d=daysFromNow(r.vencimento);
                const cor=d===0?"var(--red)":d<=2?"var(--orange)":"var(--yellow)";
                return (
                  <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--bg3)",borderRadius:8,padding:"10px 12px",borderLeft:`3px solid ${cor}`}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{r.descricao}</div>
                      <div style={{fontSize:11,color:"var(--text3)"}}>{r.cliente} · Vence {fmtDate(r.vencimento)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:700,color:"var(--green)"}}>{fmt(r.valor)}</div>
                      <div style={{fontSize:11,color:cor}}>{d===0?"Hoje":d===1?"Amanhã":`${d} dias`}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <div className="card">
          <div className="card-header">
            <div><div className="card-title">📤 A Pagar — Próx. 7 dias</div><div className="card-sub">{next7Pag.length} título(s) em aberto</div></div>
          </div>
          {next7Pag.length===0 ? <div className="empty-state">Nenhum título nos próximos 7 dias</div> : (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {next7Pag.map(r=>{
                const d=daysFromNow(r.vencimento);
                const cor=d===0?"var(--red)":d<=2?"var(--orange)":"var(--yellow)";
                return (
                  <div key={r.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"var(--bg3)",borderRadius:8,padding:"10px 12px",borderLeft:`3px solid ${cor}`}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{r.descricao}</div>
                      <div style={{fontSize:11,color:"var(--text3)"}}>{r.fornecedor} · Vence {fmtDate(r.vencimento)}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:700,color:"var(--red)"}}>{fmt(r.valor)}</div>
                      <div style={{fontSize:11,color:cor}}>{d===0?"Hoje":d===1?"Amanhã":`${d} dias`}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>

      {/* Gráfico */}
      <div className="card">
        <div className="card-header">
          <div><div className="card-title">Fluxo de Caixa — Últimos 6 meses</div></div>
          <div style={{display:"flex",gap:16,fontSize:12}}>
            <span style={{color:"var(--green)"}}>● Receber</span>
            <span style={{color:"var(--red)"}}>● Pagar</span>
          </div>
        </div>
        <div style={{display:"flex",gap:8,height:100,alignItems:"flex-end"}}>
          {months.map((m,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{flex:1,width:"100%",display:"flex",gap:3,alignItems:"flex-end"}}>
                <div style={{flex:1,background:"linear-gradient(180deg,var(--green),rgba(62,207,142,.3))",borderRadius:"3px 3px 0 0",height:`${(rv[i]/mx)*100}%`}}/>
                <div style={{flex:1,background:"linear-gradient(180deg,var(--red),rgba(240,101,101,.3))",borderRadius:"3px 3px 0 0",height:`${(pv[i]/mx)*100}%`}}/>
              </div>
              <span style={{fontSize:10,color:"var(--text3)"}}>{m}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── CLIENTES ────────────────────────────────────────────────────────────────
function Clientes({clientes,setClientes,cobrancas,toast}) {
  const [modal,setModal]=useState(false);
  const [editing,setEditing]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [filtroAluno,setFiltroAluno]=useState("");
  const [filtroStatus,setFiltroStatus]=useState("");
  const emptyForm={nome:"",cpf:"",email:"",telefone:"",nomeAluno:"",cep:"",endereco:"",bairro:"",cidade:"",estado:"SP",status:"ativo",bloqueado:false};
  const [form,setForm]=useState(emptyForm);
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const openNew=()=>{setForm(emptyForm);setEditing(null);setModal(true);};
  const openEdit=c=>{setForm({...c});setEditing(c.id);setModal(true);};

  const save=()=>{
    if(editing) setClientes(p=>p.map(c=>c.id===editing?{...form,id:editing}:c));
    else setClientes(p=>[...p,{...form,id:Date.now()}]);
    setModal(false);
    toast(editing?"✅ Cliente atualizado!":"✅ Cliente cadastrado!");
  };

  const bloquear=id=>{
    setClientes(p=>p.map(c=>c.id===id?{...c,bloqueado:!c.bloqueado}:c));
    toast("🔒 Status do cliente alterado!");
  };

  const excluir=id=>{
    const temCob=cobrancas.some(c=>c.clienteId===id);
    if(temCob){toast("⚠️ Não é possível excluir: cliente possui cobranças geradas.");return;}
    setConfirm({msg:"Deseja excluir este cliente?",fn:()=>{setClientes(p=>p.filter(c=>c.id!==id));toast("🗑️ Cliente excluído!");}});
  };

  const lista=clientes.filter(c=>{
    const aOk=!filtroAluno||c.nomeAluno.toLowerCase().includes(filtroAluno.toLowerCase())||c.nome.toLowerCase().includes(filtroAluno.toLowerCase());
    const sOk=!filtroStatus||(filtroStatus==="bloqueado"?c.bloqueado:c.status===filtroStatus&&!c.bloqueado);
    return aOk&&sOk;
  });

  return (
    <div>
      {confirm && <ConfirmModal msg={confirm.msg} onConfirm={()=>{confirm.fn();setConfirm(null);}} onClose={()=>setConfirm(null)}/>}
      {modal && (
        <Modal title={editing?"Editar Cliente":"Novo Cliente"} onClose={()=>setModal(false)}>
          <div className="form-grid">
            <Inp label="Nome Completo" value={form.nome} onChange={f("nome")}/>
            <Inp label="CPF" value={form.cpf} placeholder="000.000.000-00" onChange={f("cpf")}/>
            <Inp label="E-mail" value={form.email} onChange={f("email")}/>
            <Inp label="Telefone" value={form.telefone} placeholder="(00) 00000-0000" onChange={f("telefone")}/>
            <Inp label="Nome do Aluno / Paciente" value={form.nomeAluno} onChange={f("nomeAluno")}/>
            <Inp label="CEP" value={form.cep} onChange={f("cep")}/>
            <Inp label="Endereço (Rua e Número)" value={form.endereco} onChange={f("endereco")}/>
            <Inp label="Bairro" value={form.bairro} onChange={f("bairro")}/>
            <Inp label="Cidade" value={form.cidade} onChange={f("cidade")}/>
            <Sel label="Estado" value={form.estado} onChange={f("estado")}>
              {["SP","RJ","MG","RS","PR","SC","BA","CE","PE","GO","DF"].map(s=><option key={s}>{s}</option>)}
            </Sel>
          </div>
          <div className="modal-actions">
            <button className="btn sec" onClick={()=>setModal(false)}>Cancelar</button>
            <button className="btn" onClick={save}>{editing?"Salvar Alterações":"Cadastrar Cliente"}</button>
          </div>
        </Modal>
      )}

      <div className="filter-bar">
        <Inp label="" placeholder="🔍 Buscar por aluno / paciente ou responsável" value={filtroAluno} onChange={e=>setFiltroAluno(e.target.value)}/>
        <Sel label="" value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} style={{width:160}}>
          <option value="">Todos os status</option>
          <option value="ativo">Ativos</option>
          <option value="bloqueado">Bloqueados</option>
        </Sel>
        <button className="btn sm sec" onClick={()=>{setFiltroAluno("");setFiltroStatus("");}}>Limpar</button>
      </div>

      <div className="card">
        <div className="card-header">
          <div><div className="card-title">Clientes</div><div className="card-sub">{lista.length} de {clientes.length} registros</div></div>
          <button className="btn" onClick={openNew}>+ Novo Cliente</button>
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Nome</th><th>CPF</th><th>Aluno / Paciente</th><th>Telefone</th><th>Cidade</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody>{lista.map(c=>(
              <tr key={c.id} className={c.bloqueado?"highlight-row-red":""}>
                <td style={{fontWeight:600,color:c.bloqueado?"var(--red)":"var(--text)"}}>{c.nome}</td>
                <td>{c.cpf}</td>
                <td>{c.nomeAluno}</td>
                <td>{c.telefone}</td>
                <td>{c.cidade}/{c.estado}</td>
                <td><StatusBadge s={c.bloqueado?"bloqueado":c.status}/></td>
                <td>
                  <div className="action-group">
                    <button className="btn sm sec" onClick={()=>openEdit(c)}>✏️ Editar</button>
                    <button className="btn sm warn" onClick={()=>bloquear(c.id)}>{c.bloqueado?"🔓 Desbloquear":"🔒 Bloquear"}</button>
                    <button className="btn sm danger" onClick={()=>excluir(c.id)}>🗑️</button>
                  </div>
                </td>
              </tr>
            ))}</tbody>
          </table>
          {lista.length===0&&<div className="empty-state">Nenhum cliente encontrado</div>}
        </div>
      </div>
    </div>
  );
}

// ─── FINANCEIRO ───────────────────────────────────────────────────────────────
function Financeiro({receber,setReceber,pagar,setPagar,notas,setNotas,clientes,fornecedores,plano,cobrancas,contasBancarias,toast}) {
  // Default to current month
  const _hoje=new Date();
  const _y=_hoje.getFullYear();
  const _m=String(_hoje.getMonth()+1).padStart(2,"0");
  const _iniMes=`${_y}-${_m}-01`;
  const _fimMes=`${_y}-${_m}-${new Date(_y,_hoje.getMonth()+1,0).getDate().toString().padStart(2,"0")}`;

  const [tab,setTab]=useState("movimentacao");
  const [modal,setModal]=useState(false);
  const [nfModal,setNfModal]=useState(null);
  const [confirm,setConfirm]=useState(null);
  // Filters
  const [fStatus,setFStatus]=useState("");
  const [fCliente,setFCliente]=useState("");
  const [fFornecedor,setFornecedorF]=useState("");
  const [periodoIni,setPeriodoIni]=useState(_iniMes);
  const [periodoFim,setPeriodoFim]=useState(_fimMes);
  const [fCategoria,setFCategoria]=useState("");
  const [fConta,setFConta]=useState("");
  // Conciliação
  const [ofxLancamentos,setOfxLancamentos]=useState([]);
  const [ofxFile,setOfxFile]=useState("");
  const [conciliadoIds,setConciliadoIds]=useState(new Set());
  const [fContaConcil,setFContaConcil]=useState("");

  const cats3Rec=plano.filter(p=>p.nivel===3&&(p.tipo==="receber"||p.tipo==="ambos"));
  const cats3Pag=plano.filter(p=>p.nivel===3&&(p.tipo==="pagar"||p.tipo==="ambos"));

  const emptyRec={descricao:"",observacao:"",valor:"",vencimento:"",status:"pendente",planoId:"",clienteId:"",cliente:""};
  const emptyPag={descricao:"",observacao:"",valor:"",vencimento:"",status:"pendente",planoId:"",fornecedorId:"",fornecedor:""};
  const [form,setForm]=useState(emptyRec);
  const f=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  const openModal=()=>{setForm(tab==="receber"?emptyRec:emptyPag);setModal(true);};

  const save=()=>{
    if(tab==="receber"){
      const cl=clientes.find(c=>c.id===+form.clienteId);
      setReceber(p=>[...p,{...form,id:Date.now(),valor:+form.valor,cliente:cl?.nome||form.cliente,planoId:+form.planoId}]);
    } else {
      const fn=fornecedores.find(x=>x.id===+form.fornecedorId);
      setPagar(p=>[...p,{...form,id:Date.now(),valor:+form.valor,fornecedor:fn?.nome||form.fornecedor,planoId:+form.planoId}]);
    }
    setModal(false);toast("✅ Título registrado!");
  };

  const delRec=id=>{setReceber(p=>p.filter(x=>x.id!==id));toast("🗑️ Título excluído!");};
  const delPag=id=>{setPagar(p=>p.filter(x=>x.id!==id));toast("🗑️ Título excluído!");};
  const cancelarNF=id=>{setNotas(p=>p.map(n=>n.id===id?{...n,status:"CANCELADA"}:n));toast("📄 NF-e cancelada!");};

  const aplicarFiltros=(list,tipo)=>{
    return list.filter(x=>{
      const st=!fStatus||x.status===fStatus;
      const cl=!fCliente||(x.cliente||x.descricao||"").toLowerCase().includes(fCliente.toLowerCase());
      const fn=!fFornecedor||(x.fornecedor||x.descricao||"").toLowerCase().includes(fFornecedor.toLowerCase());
      const cat=!fCategoria||x.planoId===+fCategoria;
      const di=!periodoIni||x.vencimento>=periodoIni;
      const df=!periodoFim||x.vencimento<=periodoFim;
      const conta=!fConta||x.contaBancariaId===+fConta||x.contaBancariaId===fConta;
      return st&&cl&&fn&&cat&&di&&df&&conta;
    });
  };

  const listaRec=aplicarFiltros(receber,"receber");
  const listaPag=aplicarFiltros(pagar,"pagar");
  const totalRec=listaRec.reduce((a,b)=>a+b.valor,0);
  const totalPag=listaPag.reduce((a,b)=>a+b.valor,0);

  // Movimentação: todos os lançamentos combinados
  const listaMovFmt=item=>({...item,_tipo:receber.includes(item)?"receber":"pagar"});
  const listaMov=[...listaRec.map(x=>({...x,_tipo:"receber"})),...listaPag.map(x=>({...x,_tipo:"pagar"}))].sort((a,b)=>
    (b.vencimento||"").localeCompare(a.vencimento||"")
  );

  // Parser OFX simples
  const parseOFX=(text)=>{
    const items=[];
    const stmttrn=text.match(/<STMTTRN>([\s\S]*?)<\/STMTTRN>/g)||[];
    stmttrn.forEach(t=>{
      const get=(tag)=>t.match(new RegExp("<"+tag+">([^<\r\n]+)"))?.[1]?.trim()||"";
      items.push({
        id:get("FITID"),
        dtPosted:get("DTPOSTED")?.slice(0,8),
        valor:parseFloat(get("TRNAMT"))||0,
        memo:get("MEMO")||get("NAME")||"",
        tipo:parseFloat(get("TRNAMT"))>=0?"credito":"debito",
      });
    });
    return items;
  };

  const conciliarItem=(ofxId,lancId,tipo)=>{
    setConciliadoIds(prev=>{const s=new Set(prev);s.add(ofxId+"|"+lancId+"|"+tipo);return s;});
    if(tipo==="receber") setReceber(p=>p.map(x=>x.id===lancId?{...x,status:"recebido",dataPagamento:new Date().toISOString().slice(0,10)}:x));
    else setPagar(p=>p.map(x=>x.id===lancId?{...x,status:"pago",dataPagamento:new Date().toISOString().slice(0,10)}:x));
    toast("✅ Lançamento conciliado!");
  };

  const emitirNFe=(item)=>setNfModal(item);

  return (
    <div>
      {confirm && <ConfirmModal msg={confirm.msg} onConfirm={()=>{confirm.fn();setConfirm(null);}} onClose={()=>setConfirm(null)}/>}

      {nfModal && (

          <div className="info-box">🔗 Integrado ao Portal Nacional NFS-e. Certificado digital necessário em produção.</div>
          <div className="form-grid">
            <Inp label="Tomador" value={nfModal.cliente||""} onChange={()=>{}}/>
            <Inp label="Competência (MM/AAAA)" placeholder="02/2025"/>
            <Sel label="Atividade / Serviço">
              {NBS_SERVICES.map(s=><option key={s.cnae}>{s.cnae} — {s.desc}</option>)}
            </Sel>
            <Inp label="Valor (R$)" value={nfModal.valor||""} type="number" onChange={()=>{}}/>

            <Sel label="Regime Tributário"><option>Simples Nacional</option><option>Lucro Presumido</option></Sel>
            <div className="form-full"><Txt label="Discriminação do Serviço" placeholder="Descrição detalhada do serviço prestado" defaultValue={nfModal.descricao||""}/></div>
          </div>
          <div className="modal-actions">
            <button className="btn sec" onClick={()=>setNfModal(null)}>Cancelar</button>
            <button className="btn" onClick={()=>{setNfModal(null);toast("📄 NF-e emitida com sucesso!");}}>📄 Emitir NF-e</button>
          </div>
        </Modal>
      )}

      {modal && (
        <Modal title={tab==="receber"?"Nova Conta a Receber":"Nova Conta a Pagar"} onClose={()=>setModal(false)} maxWidth={640}>

            <div className="form-full">

            <Inp label="Valor (R$)" type="number" value={form.valor} onChange={f("valor")}/>
            <Inp label="Vencimento" type="date" value={form.vencimento} onChange={f("vencimento")}/>
            {tab==="receber" ? (
              <>
                <Sel label="Cliente" value={form.clienteId} onChange={f("clienteId")}>
                  <option value="">Selecione...</option>
                  {clientes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
                </Sel>
                <Sel label="Categoria (Plano de Contas)" value={form.planoId} onChange={f("planoId")}>
                  <option value="">Selecione...</option>
                  {cats3Rec.map(p=><option key={p.id} value={p.id}>{p.codigo} — {p.nome}</option>)}
                </Sel>
              </>
            ) : (
              <>
                <Sel label="Fornecedor" value={form.fornecedorId} onChange={f("fornecedorId")}>

                <Sel label="Categoria (Plano de Contas)" value={form.planoId} onChange={f("planoId")}>

                </Sel>
              </>

            <Sel label="Status" value={form.status} onChange={f("status")}>
              {tab==="receber"
                ?[["pendente","Pendente"],["recebido","Recebido"],["cancelado","Cancelado"]].map(([v,l])=><option key={v} value={v}>{l}</option>)
                :[["pendente","Pendente"],["pago","Pago"],["cancelado","Cancelado"]].map(([v,l])=><option key={v} value={v}>{l}</option>)
              }
            </Sel>
          </div>
          <div className="modal-actions">
            <button className="btn sec" onClick={()=>setModal(false)}>Cancelar</button>
            {tab==="receber" && <button className="btn sec" onClick={()=>{save();setNfModal({...form,cliente:clientes.find(c=>c.id===+form.clienteId)?.nome,valor:+form.valor});}}>Salvar + Emitir NF-e</button>}

          {l:"Já Recebido",v:fmt(receber.filter(r=>r.status==="recebido").reduce((a,b)=>a+b.valor,0)),c:"var(--green)"},
          {l:"Total a Pagar",v:fmt(pagar.filter(p=>p.status==="pendente").reduce((a,b)=>a+b.valor,0)),c:"var(--red)"},
          {l:"Já Pago",v:fmt(pagar.filter(p=>p.status==="pago").reduce((a,b)=>a+b.valor,0)),c:"var(--red)"},

        <Sel label="" value={fCategoria} onChange={e=>setFCategoria(e.target.value)} style={{width:180}}>

      </div>

              <thead><tr>
                <th>Tipo</th><th>Descrição</th><th>Parte</th><th>Categoria</th>

                const pgto=x.dataPagamento?new Date(x.dataPagamento+"T12:00:00").toLocaleDateString("pt-BR"):"—";

                return (
                  <tr key={x.id+x._tipo} className={venceu?"highlight-row-red":""}>
                    <td><span style={{fontSize:11,padding:"2px 8px",borderRadius:10,fontWeight:700,
                      background:isRec?"rgba(30,200,120,.15)":"rgba(240,100,100,.12)",
                      color:isRec?"var(--green)":"var(--red)"}}>{isRec?"↑ Receber":"↓ Pagar"}</span></td>
                    <td style={{maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.descricao}</td>
                    <td style={{fontSize:12}}>{isRec?x.cliente:x.fornecedor}</td>
                    <td style={{fontSize:12,color:"var(--text3)"}}>{cat}</td>
                    <td style={{fontSize:12}}>{venc}</td>
                    <td style={{fontSize:12,color:"var(--text3)"}}>{pgto}</td>
                    <td style={{fontWeight:700,color:"var(--green)"}}>{isRec?fmt(x.valor):"—"}</td>
                    <td style={{fontWeight:700,color:"var(--red)"}}>{!isRec?fmt(x.valor):"—"}</td>
                    <td><StatusBadge s={x.status}/></td>
                  </tr>
                );
              })}</tbody>
            </table>
            {listaMov.length===0&&<div className="empty-state">Nenhum lançamento no período</div>}
            <div style={{padding:"10px 16px",borderTop:"1px solid var(--border)",display:"flex",gap:24,fontSize:13}}>
              <span>Total Receitas: <strong style={{color:"var(--green)"}}>{fmt(listaRec.reduce((a,b)=>a+b.valor,0))}</strong></span>
              <span>Total Despesas: <strong style={{color:"var(--red)"}}>{fmt(listaPag.reduce((a,b)=>a+b.valor,0))}</strong></span>
              <span>Saldo: <strong style={{color:listaRec.reduce((a,b)=>a+b.valor,0)-listaPag.reduce((a,b)=>a+b.valor,0)>=0?"var(--green)":"var(--red)"}}>{fmt(listaRec.reduce((a,b)=>a+b.valor,0)-listaPag.reduce((a,b)=>a+b.valor,0))}</strong></span>
            </div>
          </div>
        )}

        {/* ─── CONCILIAÇÃO ─────────────────────────────────────────────── */}
        {tab==="conciliacao"&&(
          <div>
            {/* Upload OFX */}
            <div style={{padding:16,background:"var(--bg2)",borderRadius:8,marginBottom:16,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontWeight:600,fontSize:13}}>📂 Importar arquivo OFX:</span>
              <input type="file" accept=".ofx,.OFX" onChange={e=>{
                const file=e.target.files[0];if(!file)return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  const text=ev.target.result;
                  setOfxFile(file.name);
                  setOfxLancamentos(parseOFX(text));
                  toast("✅ "+parseOFX(text).length+" lançamentos importados!");
                };
                reader.readAsText(file,"latin1");
              }} style={{fontSize:12}}/>
              {ofxFile&&<span style={{fontSize:12,color:"var(--text3)"}}>📄 {ofxFile} — {ofxLancamentos.length} lançamentos</span>}
              {(contasBancarias||[]).length>0&&<Sel label="" value={fContaConcil} onChange={e=>setFContaConcil(e.target.value)} style={{width:160}}>
                <option value="">Selecione a conta</option>
                {(contasBancarias||[]).map(c=><option key={c.id} value={c.id}>{c.banco}</option>)}
              </Sel>}
            </div>

            {ofxLancamentos.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                {/* Extrato OFX */}
                <div>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:8,padding:"6px 12px",background:"var(--bg3)",borderRadius:6}}>
                    🏦 Extrato Bancário ({ofxLancamentos.length} lançamentos)
                  </div>
                  <div style={{maxHeight:500,overflowY:"auto"}}>
                    {ofxLancamentos.filter(l=>{
                      const d=l.dtPosted?l.dtPosted.slice(0,4)+"-"+l.dtPosted.slice(4,6)+"-"+l.dtPosted.slice(6,8):"";
                      return (!periodoIni||d>=periodoIni)&&(!periodoFim||d<=periodoFim);
                    }).map(l=>{
                      const conciliado=[...conciliadoIds].some(id=>id.startsWith(l.id+"|"));
                      const dt=l.dtPosted?l.dtPosted.slice(6,8)+"/"+l.dtPosted.slice(4,6)+"/"+l.dtPosted.slice(0,4):"—";
                      return (
                        <div key={l.id} style={{padding:"8px 12px",borderBottom:"1px solid var(--border)",

                        {p.status==="pendente"&&<button className="btn sm sec" onClick={()=>{setPagar(prev=>prev.map(x=>x.id===p.id?{...x,status:"pago"}:x));toast("✅ Título quitado!");}}>✔ Quitar</button>}

                      </div>
                    </td>
                  </tr>
                );
              })}</tbody>
            </table>
            {listaPag.length===0&&<div className="empty-state">Nenhum título encontrado</div>}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── RELATÓRIOS ───────────────────────────────────────────────────────────────
function Relatorios({receber,pagar,cobrancas,plano,subcontas}) {
  const [tab,setTab]=useState("analitico-rec");
  const [periodo,setPeriodo]=useState("mes");
  const [periodoIni,setPeriodoIni]=useState("");
  const [periodoFim,setPeriodoFim]=useState("");

  const cats3Rec=plano.filter(p=>p.nivel===3&&(p.tipo==="receber"||p.tipo==="ambos"));
  const cats3Pag=plano.filter(p=>p.nivel===3&&(p.tipo==="pagar"||p.tipo==="ambos"));

  const totalRec=receber.filter(r=>r.status!=="cancelado").reduce((a,b)=>a+b.valor,0);
  const recebido=receber.filter(r=>r.status==="recebido").reduce((a,b)=>a+b.valor,0);
  const totalPag=pagar.filter(p=>p.status!=="cancelado").reduce((a,b)=>a+b.valor,0);
  const pago=pagar.filter(p=>p.status==="pago").reduce((a,b)=>a+b.valor,0);

  const recPorCat=cats3Rec.map(c=>{
    const items=receber.filter(r=>r.planoId===c.id&&r.status!=="cancelado");
    return {nome:c.nome,codigo:c.codigo,total:items.reduce((a,b)=>a+b.valor,0),qtd:items.length,recebido:items.filter(r=>r.status==="recebido").reduce((a,b)=>a+b.valor,0)};
  }).filter(c=>c.qtd>0);

  const pagPorCat=cats3Pag.map(c=>{
    const items=pagar.filter(p=>p.planoId===c.id&&p.status!=="cancelado");
    return {nome:c.nome,codigo:c.codigo,total:items.reduce((a,b)=>a+b.valor,0),qtd:items.length,pago:items.filter(p=>p.status==="pago").reduce((a,b)=>a+b.valor,0)};
  }).filter(c=>c.qtd>0);

  const splitPorSub=subcontas.map(s=>{
    const cobs=cobrancas.filter(c=>c.splits?.some(sp=>sp.walletId===s.walletId));
    const totalCobranca=cobs.reduce((a,c)=>a+c.valor,0);
    const totalSplit=cobs.reduce((a,c)=>{
      const sp=c.splits.find(x=>x.walletId===s.walletId);
      if(!sp) return a;
      return a+(sp.splitType==="PERCENTUAL"?c.valor*(+sp.valor/100):(+sp.valor||0));
    },0);
    const splitRecebido=cobs.filter(c=>c.status==="RECEIVED").reduce((a,c)=>{const sp=c.splits.find(x=>x.walletId===s.walletId);return a+(sp?.splitType==="PERCENTUAL"?c.valor*(+sp.valor/100):(+sp?.valor||0));},0);
    return {nome:s.nome,walletId:s.walletId,qtdCob:cobs.length,totalCobranca,totalSplit,recebido:splitRecebido};
  });

  return (
    <div>
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <Sel label="" value={periodo} onChange={e=>setPeriodo(e.target.value)} style={{width:180}}>
          <option value="mes">Este mês</option>
          <option value="trim">Trimestre</option>
          <option value="ano">Ano atual</option>
          <option value="custom">Período personalizado</option>
        </Sel>
        {periodo==="custom" && (
          <>
            <Inp label="" type="date" value={periodoIni} onChange={e=>setPeriodoIni(e.target.value)} style={{width:160}}/>
            <Inp label="" type="date" value={periodoFim} onChange={e=>setPeriodoFim(e.target.value)} style={{width:160}}/>
          </>
        )}
        <button className="btn sm sec">⬇ Exportar CSV</button>
        <button className="btn sm sec">⬇ Exportar PDF</button>
      </div>

      <div className="stats-grid" style={{marginBottom:20}}>
        {[
          {l:"A Receber (total)",v:fmt(totalRec),c:"var(--green)"},
          {l:"Recebido",v:fmt(recebido),c:"var(--green)"},
          {l:"A Pagar (total)",v:fmt(totalPag),c:"var(--red)"},
          {l:"Resultado Líquido",v:fmt(recebido-pago),c:recebido-pago>=0?"var(--green)":"var(--red)"},
        ].map((s,i)=>(
          <div className="stat-card" key={i}>
            <div className="stat-label">{s.l}</div>
            <div className="stat-value" style={{fontSize:20,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      <div className="tabs">
        <div className={`tab ${tab==="analitico-rec"?"active":""}`} onClick={()=>setTab("analitico-rec")}>Analítico — Receber</div>
        <div className={`tab ${tab==="analitico-pag"?"active":""}`} onClick={()=>setTab("analitico-pag")}>Analítico — Pagar</div>
        <div className={`tab ${tab==="split"?"active":""}`} onClick={()=>setTab("split")}>Divisão de Pagamentos</div>
        <div className={`tab ${tab==="sintese"?"active":""}`} onClick={()=>setTab("sintese")}>Síntese</div>
        <div className={`tab ${tab==="dre"?"active":""}`} onClick={()=>setTab("dre")}>DRE</div>
      </div>

      {tab==="analitico-rec" && (
        <div className="card">
          <div className="card-header"><div className="card-title">Relatório Analítico — Contas a Receber por Categoria</div></div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>Código</th><th>Categoria</th><th>Qtd Títulos</th><th>Total Previsto</th><th>Recebido</th><th>A Receber</th><th>% Recebido</th></tr></thead>
              <tbody>

          <div className="table-wrap">

              <thead><tr><th>Código</th><th>Categoria</th><th>Qtd Títulos</th><th>Total Previsto</th><th>Pago</th><th>A Pagar</th><th>% Pago</th></tr></thead>

                    <td style={{color:"var(--green)",fontWeight:700}}>{fmt(c.pago)}</td>

// ─── DRE ─────────────────────────────────────────────────────────────────────
function DRE({receber,pagar,plano}) {
  const [criterio,setCriterio]=useState("competencia"); // competencia | caixa
  const [periodoIni,setPeriodoIni]=useState("");
  const [periodoFim,setPeriodoFim]=useState("");

  // Filtra por período com base no critério
  const filtrarRec = (items) => items.filter(r=>{
    if(r.status==="cancelado") return false;
    const dtBase = criterio==="caixa" ? r.dataPagamento||r.vencimento : r.vencimento;
    const di = !periodoIni || dtBase>=periodoIni;
    const df = !periodoFim || dtBase<=periodoFim;
    return di && df;
  });
  const filtrarPag = (items) => items.filter(p=>{
    if(p.status==="cancelado") return false;
    const dtBase = criterio==="caixa" ? p.dataPagamento||p.vencimento : p.vencimento;
    const di = !periodoIni || dtBase>=periodoIni;
    const df = !periodoFim || dtBase<=periodoFim;
    return di && df;
  });

  const recFilt   = criterio==="caixa" ? filtrarRec(receber).filter(r=>r.status==="recebido") : filtrarRec(receber);
  const pagFilt   = criterio==="caixa" ? filtrarPag(pagar).filter(p=>p.status==="pago")       : filtrarPag(pagar);

  // Agrupar receitas por categoria nível 3 → nível 2 → nível 1
  const nivel1Rec = plano.filter(p=>p.nivel===1&&(p.tipo==="receber"||p.tipo==="ambos"));
  const nivel1Pag = plano.filter(p=>p.nivel===1&&(p.tipo==="pagar"||p.tipo==="ambos"));

  const getRecCat  = (cat3Id) => recFilt.filter(r=>r.planoId===cat3Id).reduce((a,b)=>a+b.valor,0);
  const getPagCat  = (cat3Id) => pagFilt.filter(p=>p.planoId===cat3Id).reduce((a,b)=>a+b.valor,0);

  const buildTree = (nivel1List, getter) =>
    nivel1List.map(n1=>{
      const grupos=plano.filter(p=>p.nivel===2&&p.pai===n1.id);
      const gruposData=grupos.map(n2=>{
        const cats=plano.filter(p=>p.nivel===3&&p.pai===n2.id);
        const catsData=cats.map(n3=>({...n3,total:getter(n3.id)})).filter(c=>c.total>0);
        return {...n2,cats:catsData,total:catsData.reduce((a,c)=>a+c.total,0)};
      }).filter(g=>g.total>0);
      return {...n1,grupos:gruposData,total:gruposData.reduce((a,g)=>a+g.total,0)};
    }).filter(n=>n.total>0);

  const treeRec   = buildTree(nivel1Rec, getRecCat);
  const treePag   = buildTree(nivel1Pag, getPagCat);

  const totalReceita = treeRec.reduce((a,n)=>a+n.total,0);
  const totalDespesa = treePag.reduce((a,n)=>a+n.total,0);
  const resultado    = totalReceita - totalDespesa;
  const margemBruta  = totalReceita>0 ? ((resultado/totalReceita)*100).toFixed(1) : "0.0";

  const rowStyle = (nivel) => ({
    display:"flex", justifyContent:"space-between", alignItems:"center",
    padding: nivel===1?"14px 16px" : nivel===2?"10px 16px 10px 32px":"8px 16px 8px 52px",
    borderBottom:"1px solid var(--border)",
    background: nivel===1?"var(--bg3)":nivel===2?"var(--surface2)":"transparent",
    fontWeight: nivel===1?800:nivel===2?600:400,
    fontSize: nivel===1?14:nivel===2?13:12.5,
    color: nivel===1?"var(--text)":nivel===2?"var(--text2)":"var(--text3)",
  });

  return (
    <div>
      {/* Controles */}
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,background:"var(--bg3)",padding:4,borderRadius:10}}>
          {[["competencia","📅 Competência"],["caixa","💰 Caixa (Recebido/Pago)"]].map(([v,l])=>(
            <button key={v} onClick={()=>setCriterio(v)} style={{padding:"7px 16px",borderRadius:7,cursor:"pointer",fontFamily:"var(--font-body)",fontSize:12.5,fontWeight:600,border:"none",transition:"all .15s",background:criterio===v?"var(--surface2)":"transparent",color:criterio===v?"var(--text)":"var(--text3)"}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--text3)"}}>
          <span>De:</span>
          <input type="date" className="form-input" style={{width:160,fontSize:12}} value={periodoIni} onChange={e=>setPeriodoIni(e.target.value)}/>
          <span>Até:</span>
          <input type="date" className="form-input" style={{width:160,fontSize:12}} value={periodoFim} onChange={e=>setPeriodoFim(e.target.value)}/>
          <button className="btn sm sec" onClick={()=>{setPeriodoIni("");setPeriodoFim("");}}>Limpar</button>
        </div>
        <button className="btn sm sec">⬇ Exportar PDF</button>
      </div>

      {/* Cards resumo */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:16,marginBottom:20}}>
        {[
          {l:"Receita Total",v:fmt(totalReceita),c:"var(--green)"},
          {l:"Despesa Total",v:fmt(totalDespesa),c:"var(--red)"},
          {l:"Resultado",v:fmt(resultado),c:resultado>=0?"var(--green)":"var(--red)"},
          {l:"Margem Líquida",v:`${margemBruta}%`,c:+margemBruta>=0?"var(--green)":"var(--red)"},
        ].map((s,i)=>(
          <div className="stat-card" key={i}>
            <div className="stat-label">{s.l}</div>
            <div className="stat-value" style={{fontSize:20,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* DRE estruturada */}
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        {/* Cabeçalho */}
        <div style={{background:"var(--bg)",padding:"16px 20px",borderBottom:"2px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"var(--font-head)",fontSize:15,fontWeight:800}}>DRE — Demonstrativo de Resultado do Exercício</div>
            <div style={{fontSize:12,color:"var(--text3)",marginTop:2}}>
              Critério: <strong style={{color:"var(--accent2)"}}>{criterio==="competencia"?"Competência (data de vencimento)":"Regime de Caixa (recebido/pago)"}</strong>
              {(periodoIni||periodoFim)&&<span> · Período: {fmtDate(periodoIni)||"início"} a {fmtDate(periodoFim)||"fim"}</span>}
            </div>
          </div>
          <div style={{fontSize:11,color:"var(--text3)",textAlign:"right"}}>
            Gerado em {new Date().toLocaleDateString("pt-BR")}
          </div>
        </div>

        {/* RECEITAS */}
        <div style={{...rowStyle(1),borderBottom:"2px solid var(--border)",color:"var(--green)",fontSize:15}}>
          <span>( + ) RECEITAS OPERACIONAIS</span>
          <span style={{color:"var(--green)"}}>{fmt(totalReceita)}</span>
        </div>
        {treeRec.length===0 && (
          <div style={{padding:"14px 16px",fontSize:13,color:"var(--text3)"}}>Nenhuma receita no período selecionado.</div>
        )}
        {treeRec.map(n1=>(
          <div key={n1.id}>
            {n1.grupos.map(n2=>(
              <div key={n2.id}>
                <div style={rowStyle(2)}>
                  <span>↳ {n2.codigo} — {n2.nome}</span>
                  <span style={{color:"var(--green)"}}>{fmt(n2.total)}</span>
                </div>
                {n2.cats.map(n3=>(
                  <div key={n3.id} style={rowStyle(3)}>
                    <span>{n3.codigo} — {n3.nome}</span>
                    <span>{fmt(n3.total)}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        ))}

        {/* DESPESAS */}
        <div style={{...rowStyle(1),borderTop:"2px solid var(--border)",borderBottom:"2px solid var(--border)",color:"var(--red)",fontSize:15}}>
          <span>( - ) DESPESAS OPERACIONAIS</span>
          <span style={{color:"var(--red)"}}>({fmt(totalDespesa)})</span>
        </div>
        {treePag.length===0 && (
          <div style={{padding:"14px 16px",fontSize:13,color:"var(--text3)"}}>Nenhuma despesa no período selecionado.</div>
        )}
        {treePag.map(n1=>(
          <div key={n1.id}>
            {n1.grupos.map(n2=>(
              <div key={n2.id}>
                <div style={rowStyle(2)}>
                  <span>↳ {n2.codigo} — {n2.nome}</span>
                  <span style={{color:"var(--red)"}}>({fmt(n2.total)})</span>
                </div>
                {n2.cats.map(n3=>(
                  <div key={n3.id} style={rowStyle(3)}>
                    <span>{n3.codigo} — {n3.nome}</span>
                    <span>({fmt(n3.total)})</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        ))}

        {/* RESULTADO */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px 16px",background:resultado>=0?"rgba(62,207,142,.08)":"rgba(240,101,101,.08)",borderTop:`2px solid ${resultado>=0?"var(--green)":"var(--red)"}`,}}>
          <div>
            <div style={{fontFamily:"var(--font-head)",fontSize:16,fontWeight:800,color:resultado>=0?"var(--green)":"var(--red)"}}>
              {resultado>=0?"( = ) RESULTADO LÍQUIDO DO EXERCÍCIO":"( = ) PREJUÍZO DO EXERCÍCIO"}
            </div>
            <div style={{fontSize:12,color:"var(--text3)",marginTop:4}}>
              Margem líquida: {margemBruta}% · {criterio==="caixa"?"Regime de caixa":"Regime de competência"}
            </div>
          </div>
          <div style={{fontFamily:"var(--font-head)",fontSize:28,fontWeight:800,color:resultado>=0?"var(--green)":"var(--red)"}}>
            {fmt(Math.abs(resultado))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── CONFIGURAÇÕES ────────────────────────────────────────────────────────────
const CONFIG_KEY = "gestaoasaas_config";

const loadConfig = () => {
  try {
    const raw = localStorage.getItem(CONFIG_KEY);
    if(raw) return JSON.parse(raw);
  } catch {}
  return { apiKey:"", walletId:"", env:"production", backendUrl:"" };
};

const saveConfig = (cfg) => {
  try { localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg)); } catch {}
};

function Configuracoes({toast}) {
  const [cfg, setCfg] = useState(loadConfig);
  const [testando,setTestando]=useState(false);
  const [testResult,setTestResult]=useState(null);
  const [backendOk,setBackendOk]=useState(null);
  const [salvo,setSalvo]=useState(false);

  const upd = (k,v) => setCfg(p => ({...p,[k]:v}));

  const salvar = () => {
    saveConfig(cfg);
    setSalvo(true);
    setTimeout(()=>setSalvo(false), 2500);
    toast("✅ Configurações salvas! Persistidas no navegador.");
  };

  // 1º passo: verifica se o servidor backend está respondendo
  const checarBackend = async (url) => {
    try {
      const r = await fetch(`${url}/health`, {signal: AbortSignal.timeout(5000)});
      const data = await r.json();
      return {ok:true, data};
    } catch {
      return {ok:false};
    }
  };

  const testarConexao = async () => {
    const {backendUrl, apiKey} = cfg;
    if(!backendUrl.trim()) {
      toast("⚠️ Informe a URL do Backend Proxy antes de testar.");
      return;
    }
    setTestando(true);
    setTestResult(null);
    setBackendOk(null);

    // ── Passo 1: Backend está rodando? ────────────────────────────────────────
    const bk = await checarBackend(backendUrl.trim());
    if(!bk.ok) {
      setBackendOk(false);
      setTestResult({ ok:false, fase:"backend",
        msg:`Servidor não encontrado em ${backendUrl}`,
        dica:`Verifique se a URL do Railway está correta e se o serviço está ativo.`
      });
      setTestando(false);
      toast("❌ Backend não encontrado. Verifique a URL.");
      return;
    }
    setBackendOk(true);

    // ── Passo 2: Testa conexão com Asaas via backend ──────────────────────────
    // A API Key fica no Railway (.env). O backend não precisa receber pelo header.
    // Usamos o endpoint /api/asaas/balance que usa process.env.ASAAS_API_KEY no servidor.
    try {
      const headers = { "Content-Type":"application/json" };
      // Só envia pelo header se o usuário preencheu no frontend (redundante mas útil para debug)
      if(apiKey.trim()) headers["x-asaas-key"] = apiKey.trim();

      const res = await fetch(`${backendUrl.trim()}/api/asaas/balance`, { method:"GET", headers });
      const data = await res.json();

      if(res.ok && !data.error) {
        setTestResult({ok:true, msg:"Conexão com Asaas estabelecida com sucesso!", data, fase:"asaas"});
        toast("✅ Conexão confirmada! Saldo carregado.");
      } else {
        const errMsg = data?.errors?.[0]?.description || data?.message || `HTTP ${res.status}`;
        // HTTP 401 = API Key ausente no servidor  |  403 = chave inválida ou sem permissão
        const dica = res.status===401
          ? "A variável ASAAS_API_KEY não foi configurada no Railway. Adicione-a em Variables e faça Deploy."
          : res.status===403
          ? "A API Key foi recusada pela Asaas. Verifique se a chave no Railway (variável ASAAS_API_KEY) está correta e é de Produção."
          : "Verifique as variáveis no Railway e tente novamente.";
        setTestResult({ok:false, msg:`Erro da API Asaas: HTTP ${res.status}`, fase:"asaas", dica});
        toast(`❌ HTTP ${res.status} — veja as dicas na tela.`);
      }
    } catch(e) {
      setTestResult({ok:false, msg:`Erro ao chamar o backend: ${e.message}`, fase:"asaas",
        dica:"Verifique se a URL do Railway está correta."});
      toast("❌ Erro ao chamar o backend.");
    } finally {
      setTestando(false);
    }
  };

  const endpoint = cfg.env==="sandbox"
    ? "https://sandbox.asaas.com/api/v3"
    : "https://api.asaas.com/v3";

  return (
    <div>
      <div className="card" style={{maxWidth:680}}>
        <div className="card-header">
          <div><div className="card-title">Configuração API Asaas</div><div className="card-sub">Conta principal PJ</div></div>
          {salvo && <span className="badge b-green">✅ Salvo!</span>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>

          {/* Ambiente */}
          <div className="form-group">
            <label className="form-label">Ambiente</label>
            <div style={{display:"flex",gap:8}}>
              {[["sandbox","Sandbox (testes)"],["production","Produção"]].map(([v,l])=>(
                <button key={v} onClick={()=>{upd("env",v);setTestResult(null);}} style={{flex:1,padding:"10px",borderRadius:8,cursor:"pointer",fontFamily:"var(--font-body)",fontSize:13,fontWeight:600,transition:"all .15s",background:cfg.env===v?"var(--accent)":"var(--bg3)",border:`1px solid ${cfg.env===v?"var(--accent)":"var(--border)"}`,color:cfg.env===v?"#fff":"var(--text2)"}}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          <Inp label="API Key" placeholder="$aact_..." value={cfg.apiKey} onChange={e=>{upd("apiKey",e.target.value);setTestResult(null);}} type="password"/>
          <Inp label="Wallet ID (Conta Principal)" placeholder="wlt_xxxxxxxxxxxxxxxx" value={cfg.walletId} onChange={e=>upd("walletId",e.target.value)}/>

          {/* Backend URL */}
          <div className="form-group">
            <label className="form-label">URL do Backend Proxy (Railway)</label>
            <input className="form-input" value={cfg.backendUrl} onChange={e=>{upd("backendUrl",e.target.value);setTestResult(null);setBackendOk(null);}} placeholder="https://gestao-asaas-backend.up.railway.app"/>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>
              Sem o <code>/health</code> no final. Exemplo: <code style={{color:"var(--accent2)"}}>https://gestao-asaas-backend.up.railway.app</code>
            </div>
          </div>

          {/* Endpoint */}
          <div style={{background:"var(--bg3)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 14px",fontSize:12,color:"var(--text3)"}}>
            <strong style={{color:"var(--text2)"}}>Asaas Endpoint:</strong> {endpoint}
          </div>

          {/* Resultado do teste */}
          {testResult && (
            <div style={{background:testResult.ok?"rgba(62,207,142,.08)":"rgba(240,101,101,.08)",border:`1px solid ${testResult.ok?"rgba(62,207,142,.3)":"rgba(240,101,101,.3)"}`,borderRadius:10,padding:"14px 16px"}}>
              {/* Fase 1: Backend */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,fontSize:13}}>
                <span style={{fontSize:16}}>{backendOk===true?"✅":backendOk===false?"❌":"⏳"}</span>
                <strong style={{color:backendOk?"var(--green)":"var(--red)"}}>
                  {backendOk===true?`Backend OK — ${cfg.backendUrl}`:backendOk===false?"Backend não encontrado":"Verificando backend..."}
                </strong>
              </div>
              {/* Fase 2: Asaas */}
              {testResult.fase==="asaas" && (
                <div style={{display:"flex",alignItems:"flex-start",gap:8,fontSize:13}}>
                  <span style={{fontSize:16}}>{testResult.ok?"✅":"❌"}</span>
                  <div style={{flex:1}}>
                    <strong style={{color:testResult.ok?"var(--green)":"var(--red)"}}>{testResult.msg}</strong>
                    {testResult.ok && testResult.data && (
                      <div style={{display:"flex",gap:24,marginTop:8,fontSize:12}}>
                        <div>💰 Saldo disponível: <strong style={{color:"var(--green)"}}>{fmt(testResult.data.balance||0)}</strong></div>
                        {testResult.data.totalBalance!==undefined&&<div>📊 Saldo total: <strong>{fmt(testResult.data.totalBalance)}</strong></div>}
                      </div>
                    )}
                    {testResult.dica && (
                      <div style={{marginTop:10,background:"var(--bg3)",borderRadius:8,padding:"10px 12px",fontSize:12,color:"var(--text2)"}}>
                        💡 {testResult.dica}
                      </div>
                    )}
                  </div>
                </div>
              )}
              {testResult.fase==="backend" && testResult.dica && (
                <div style={{marginTop:10,background:"var(--bg3)",borderRadius:8,padding:"10px 12px",fontSize:12,color:"var(--text2)"}}>
                  💡 {testResult.dica}
                </div>
              )}
            </div>
          )}

          <div style={{display:"flex",gap:10}}>
            <button className="btn" onClick={salvar}>💾 Salvar Configurações</button>
            <button className="btn sec" onClick={testarConexao} disabled={testando} style={{minWidth:180}}>
              {testando?"⏳ Testando...":"🔗 Testar Conexão"}
            </button>
          </div>

          <div style={{background:"rgba(240,200,75,.07)",border:"1px solid rgba(240,200,75,.2)",borderRadius:8,padding:"10px 14px",fontSize:12,color:"var(--yellow)"}}>
            ⚠️ Clique em <strong>Salvar Configurações</strong> sempre que alterar algum campo — as informações ficam gravadas mesmo ao fechar o navegador.
          </div>
        </div>
      </div>

      {/* Instruções de setup */}
      <div className="card" style={{maxWidth:680,marginTop:20}}>
        <div className="card-header"><div><div className="card-title">⚙️ Como configurar o Backend Proxy</div><div className="card-sub">Necessário para integração real com a API Asaas</div></div></div>
        <div style={{display:"flex",flexDirection:"column",gap:12,fontSize:13,color:"var(--text2)"}}>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:"14px 16px",lineHeight:1.9}}>
            <div style={{fontWeight:700,color:"var(--text)",marginBottom:8}}>1. Pré-requisito: Node.js instalado</div>
            <code style={{color:"var(--accent2)"}}>node --version &nbsp; # deve ser v18+</code>
          </div>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:"14px 16px",lineHeight:1.9}}>
            <div style={{fontWeight:700,color:"var(--text)",marginBottom:8}}>2. Instalar e configurar</div>
            <code style={{color:"var(--accent2)",display:"block"}}>
              cd backend<br/>
              npm install<br/>
              cp .env.example .env
            </code>
            <div style={{marginTop:8,color:"var(--text3)"}}>Abra o arquivo <code style={{color:"var(--yellow)"}}>.env</code> e preencha <code style={{color:"var(--yellow)"}}>ASAAS_API_KEY</code> com sua chave.</div>
          </div>
          <div style={{background:"var(--bg3)",borderRadius:8,padding:"14px 16px",lineHeight:1.9}}>
            <div style={{fontWeight:700,color:"var(--text)",marginBottom:8}}>3. Iniciar o servidor</div>
            <code style={{color:"var(--accent2)"}}>node server.js</code>
            <div style={{marginTop:8,color:"var(--text3)"}}>O servidor ficará disponível em <code style={{color:"var(--green)"}}>http://localhost:3001</code></div>
          </div>
          <div style={{background:"rgba(91,106,240,.08)",border:"1px solid rgba(91,106,240,.2)",borderRadius:8,padding:"12px 14px",fontSize:12,color:"var(--accent2)"}}>
            🔒 <strong>Segurança:</strong> A API Key fica <strong>somente no servidor</strong> (arquivo .env), nunca exposta no browser. Em produção, hospede o backend em um servidor próprio (ex: VPS, Railway, Render).
          </div>
        </div>
      </div>
      <div className="card" style={{maxWidth:640,marginTop:20}}>
        <div className="card-header"><div className="card-title">Configuração NFS-e</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          <Inp label="CNPJ Emitente" placeholder="00.000.000/0001-00"/>
          <Inp label="Inscrição Municipal"/>
          <Sel label="Regime Tributário"><option>Simples Nacional</option><option>Lucro Presumido</option><option>Lucro Real</option></Sel>
          <Inp label="Certificado Digital (.pfx)" type="file"/>
          <Inp label="Senha do Certificado" type="password"/>
          <button className="btn" style={{width:"fit-content"}} onClick={()=>toast("✅ NFS-e configurada!")}>Salvar</button>
        </div>
      </div>
    </div>
  );
}



ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script></body></html>
